<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三科在线答题系统</title>
    <style>
        :root {
            --bg: #f5f6fa; --card-bg: #ffffff; --text: #2d3436; --border: #e0e0e0;
            --accent: #6c5ce7; --accent2: #00b894; --wrong: #e17055;
            --shadow: 0 2px 8px rgba(0,0,0,0.06); --hover: #f8f9fa;
        }
        [data-theme="dark"] {
            --bg: #1a1a2e; --card-bg: #16213e; --text: #e0e0e0; --border: #2a2a4a;
            --accent: #a29bfe; --accent2: #55efc4; --wrong: #fab1a0;
            --shadow: 0 2px 12px rgba(0,0,0,0.3); --hover: #1a2744;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
        }
        header {
            background: var(--card-bg); border-bottom: 1px solid var(--border);
            padding: 12px 20px; position: sticky; top: 0; z-index: 100;
            box-shadow: var(--shadow); display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
        }
        header h1 {
            font-size: 1.2rem; font-weight: 700; margin-right: auto;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .btn {
            padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px;
            cursor: pointer; font-size: 0.85rem; font-weight: 600; background: var(--card-bg);
            color: var(--text); transition: all 0.2s; white-space: nowrap;
        }
        .btn:hover { background: var(--hover); }
        .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn.accent2 { background: var(--accent2); color: #000; border-color: var(--accent2); }
        .tag-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
        main { max-width: 1000px; margin: 0 auto; padding: 16px; }
        .stats-bar {
            display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px;
            font-size: 0.85rem; color: #636e72;
        }
        .stats-bar span {
            background: var(--card-bg); padding: 6px 12px; border-radius: 20px;
            border: 1px solid var(--border);
        }
        .card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; margin-bottom: 12px;
            box-shadow: var(--shadow); transition: all 0.2s;
        }
        .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .subject-tag {
            display: inline-block; font-size: 0.7rem; font-weight: 700;
            padding: 3px 8px; border-radius: 4px; margin-bottom: 8px;
        }
        .tag-net { background: #74b9ff; color:#fff; }
        .tag-ds { background: #fdcb6e; color:#000; }
        .tag-os { background: #e17055; color:#fff; }
        .q-type { font-size: 0.75rem; color: #636e72; margin-bottom: 4px; }
        .question { font-weight: 600; font-size: 1rem; margin-bottom: 12px; line-height: 1.6; }
        /* 答题区域 */
        .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        .opt-btn {
            display: block; width: 100%; text-align: left; padding: 10px 16px;
            border: 1px solid var(--border); border-radius: 8px;
            background: var(--card-bg); color: var(--text);
            cursor: pointer; transition: 0.2s; font-size: 0.9rem;
        }
        .opt-btn:hover { background: var(--hover); }
        .opt-btn.correct { background: #d4edda; border-color: #28a745; color: #155724; }
        .opt-btn.wrong { background: #f8d7da; border-color: #dc3545; color: #721c24; }
        .opt-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        /* 判断题按钮正确/错误样式 */
        .btn.correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724 !important; }
        .btn.wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24 !important; }
        .feedback { font-weight: 700; margin-bottom: 8px; }
        .feedback.success { color: #28a745; }
        .feedback.fail { color: #dc3545; }
        .answer-input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; background: var(--card-bg); color: var(--text); margin-bottom: 8px; }
        .answer-wrap {
            display: none; margin-top: 12px; padding: 14px;
            background: #f0fff4; border-left: 3px solid var(--accent2);
            border-radius: 0 8px 8px 0; font-size: 0.9rem; line-height: 1.7;
        }
        [data-theme="dark"] .answer-wrap { background: #0d3322; }
        .card.show-answer .answer-wrap { display: block; }
        .ans-label { font-weight: 700; color: var(--accent2); margin-bottom: 4px; }
        .actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .search-box {
            width: 100%; max-width: 400px; padding: 8px 12px;
            border: 1px solid var(--border); border-radius: 8px;
            font-size: 0.9rem; background: var(--card-bg); color: var(--text);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<header>
    <h1>📚 三科在线答题系统</h1>
    <button class="btn small" onclick="toggleTheme()">🌓 夜间模式</button>
    <button class="btn small" onclick="randomOne()">🎲 随机一题</button>
    <button class="btn small accent2" onclick="resetAll()">🔄 全部重置</button>
    <button class="btn small accent2" onclick="showAllAnswers()">📖 全部答案</button>
</header>
<main>
    <input type="text" class="search-box" placeholder="🔍 搜索题目关键词..." oninput="searchQuestions(this.value)">
    <div class="tag-group">
        <button class="btn active" onclick="filterSubject('all', this)">📋 全部</button>
        <button class="btn" onclick="filterSubject('计算机网络', this)">🌐 计算机网络</button>
        <button class="btn" onclick="filterSubject('数据结构', this)">🌳 数据结构</button>
        <button class="btn" onclick="filterSubject('操作系统', this)">⚙️ 操作系统</button>
    </div>
    <div class="stats-bar" id="stats"></div>
    <div id="card-container"></div>
</main>
<script>

  {subject:"计算机网络",type:"选择题",question:"在OSI参考模型中，负责提供可靠的端到端数据传输的是（ ）的功能。<br>A.传输层 B.网络层 C.应用层 D.数据链路层",answer:"A",parse:"传输层端到端。"},
  {subject:"计算机网络",type:"选择题",question:"下列哪个是正确的电子邮件地址：（ ）。<br>A.inhe.net@wangxing B.wangxing.inhe.net C.inhe.net.wangxing D.wangxing@inhe.net",answer:"D",parse:"标准格式：用户名@域名。"},
  {subject:"计算机网络",type:"选择题",question:"一个主机从北京挪到天津使用，需要更改（ ）。<br>A.有线网卡 B.无线网卡 C.主机IP地址 D.用户名",answer:"C",parse:"IP地址与网络位置绑定。"},
  {subject:"计算机网络",type:"选择题",question:"域名服务系统（DNS）中，顶级域名EDU代表的是( )。<br>A.商业组织 B.教育机构 C.政府机构 D.国家代码",answer:"B",parse:"EDU=教育机构。"},
  {subject:"计算机网络",type:"选择题",question:"下列协议中不属于应用层协议的是（ ）。<br>A.TELNET B.SMTP C.UDP D.FTP",answer:"C",parse:"UDP是传输层协议。"},
  {subject:"计算机网络",type:"选择题",question:"布在一座大楼或一集中建筑群中的网络可称为（ ）。<br>A.LAN B.WAN C.MAN D.专用网",answer:"A",parse:"局域网LAN。"},
  {subject:"计算机网络",type:"选择题",question:"OSI参考模型的上4层分别是（ ）。<br>A.数据链路层、会话层、传输层和网络层 B.表示层、网络层、传输层和应用层 C.传输层、表示层、会话层和应用层 D.传输层、会话层、表示层和应用层",answer:"D",parse:"第4~7层：传输层、会话层、表示层、应用层。"},
  {subject:"计算机网络",type:"选择题",question:"ATM网络信元长度为（ ）。<br>A.1024B B.53B C.128B D.64B",answer:"B",parse:"53字节固定信元。"},
  {subject:"计算机网络",type:"选择题",question:"完成路径选择功能是在OSI模型的（ ）。<br>A.物理层 B.数据链路层 C.网络层 D.运输层",answer:"C",parse:"网络层进行路由选择。"},
  {subject:"计算机网络",type:"选择题",question:"下列网络属于局域网的是（ ）。<br>A.因特网 B.校园网 C.上海热线 D.中国教育网",answer:"B",parse:"校园网是局域网。"},
  {subject:"计算机网络",type:"选择题",question:"哪一个不是防火墙提供的功能（ ）。<br>A.限制访问外部主机 B.限制访问内部主机 C.防止病毒入侵 D.统计网络流量",answer:"C",parse:"防火墙不防病毒。"},
  {subject:"计算机网络",type:"选择题",question:"B类地址的缺省子网掩码是（ ）。<br>A.255.255.255.128 B.255.255.255.0 C.255.255.128.0 D.255.255.0.0",answer:"D",parse:"B类16位网络位。"},
  {subject:"计算机网络",type:"选择题",question:"将域名转换为IP地址是由（ ）服务器完成的。<br>A.WINS B.DHCP C.IIS D.DNS",answer:"D",parse:"DNS域名解析。"},
  {subject:"计算机网络",type:"选择题",question:"以太网卡的地址是（ ）位。<br>A.16 B.32 C.48 D.64",answer:"C",parse:"MAC地址48位。"},
  {subject:"计算机网络",type:"选择题",question:"WWW浏览器是用来浏览Internet上主页的（ ）。<br>A.数据 B.信息 C.硬件 D.软件",answer:"D",parse:"浏览器是应用软件。"},
  {subject:"计算机网络",type:"选择题",question:"下列属于主动攻击的是（ ）。<br>A.篡改 B.拒绝服务 C.窃听 D.流量分析",answer:"AB",parse:"主动攻击修改数据或破坏服务。"},
  {subject:"计算机网络",type:"选择题",question:"10BASE-T以太网采用的是（ ）拓扑结构。<br>A.总线型 B.网状 C.星型 D.环形",answer:"C",parse:"双绞线以太网为星型。"},
  {subject:"计算机网络",type:"简答题",question:"简述CSMA/CD协议原理。",answer:"先听后发、边发边听、冲突停发、随机重发。",parse:"载波监听多路访问/冲突检测，以太网核心协议。"},
  {subject:"计算机网络",type:"简答题",question:"协议的三要素是什么，并对三要素进行简要说明。",answer:"语法：规定数据结构与格式；语义：规定控制信息的含义；同步：规定事件时序关系。",parse:"语法=格式，语义=含义，同步=时序。"},
  {subject:"计算机网络",type:"简答题",question:"给出RFID、WLAN的中文名称并说明其主要特点。",answer:"RFID：射频识别，非接触自动识别；WLAN：无线局域网，无需布线，灵活部署。",parse:"常考。"},
  {subject:"计算机网络",type:"简答题",question:"简述透明网桥自学习算法建立和使用转发表的过程。",answer:"1.收到帧，记录源MAC和端口到转发表；2.查目的MAC，有则单播转发，无则泛洪；3.老化机制删除过期条目。",parse:"网桥核心算法。"},
  {subject:"计算机网络",type:"简答题",question:"简述时分多路复用和频分多路复用的特点。",answer:"FDM：带宽分多个子信道，同时传输；TDM：时间分片，轮流传输。",parse:"FDM适合模拟信号，TDM适合数字信号。"},
  {subject:"计算机网络",type:"简答题",question:"电子商务的安全性问题主要体现在哪些方面？",answer:"机密性、完整性、身份认证、不可否认、可用性、隐私。",parse:"六大安全需求。"},
  {subject:"计算机网络",type:"简答题",question:"简要说明分组交换和电路交换的过程和主要特点。",answer:"电路交换：建立连接→传输→释放，独占链路；分组交换：数据分片存储转发，共享链路。",parse:"核心区别在独占vs共享。"},
	  {subject:"计算机网络",type:"简答题",question:"从网络管理系统需要定义的内容中选择2个进行简要说明。",answer:"管理对象：被管理的网络资源，如路由器、交换机等；管理信息库MIB：存储被管对象属性信息的数据库。",parse:"网络管理核心概念。"},
  {subject:"计算机网络",type:"简答题",question:"从三个方面简述TCP和UDP协议的不同点。",answer:"1.连接性：TCP面向连接，UDP无连接；2.可靠性：TCP可靠（确认重传），UDP不可靠；3.传输方式：TCP字节流，UDP数据报。",parse:"传输层两大协议对比。"},
  {subject:"计算机网络",type:"简答题",question:"简述确定性服务质量保证和统计性服务质量保证的概念和区别。",answer:"确定性：提供绝对严格的性能保证，资源利用率低；统计性：基于统计的平均保证，资源利用率高。",parse:"QoS两类。"},
  {subject:"计算机网络",type:"简答题",question:"说明协议IP、PPP、TCP的中文名称，并说明协议所在层。",answer:"IP：网际协议（网络层）；PPP：点对点协议（数据链路层）；TCP：传输控制协议（传输层）。",parse:"TCP/IP协议栈核心协议。"},
  {subject:"计算机网络",type:"简答题",question:"简要说明网络管理的其中2种功能。",answer:"故障管理：检测、定位、修复网络故障；配置管理：管理设备配置信息，保证一致性。",parse:"FCAPS五大功能中的两个。"},
  {subject:"计算机网络",type:"简答题",question:"简述静态路由和动态路由的概念，并说明其主要特点。",answer:"静态路由：管理员手动配置，适合小型网络；动态路由：路由器通过协议自动学习，适合大型网络。",parse:"路由方式对比。"},
  {subject:"计算机网络",type:"简答题",question:"解释流量控制的概念，并列举一种流量控制方法。",answer:"流量控制：控制发送速率，防止接收方溢出。方法：滑动窗口机制，接收方告知窗口大小。",parse:"TCP流量控制。"},
  {subject:"计算机网络",type:"简答题",question:"简述网络安全目标中机密性和完整性的概念。",answer:"机密性：信息不被非授权窃取；完整性：信息不被篡改、伪造。",parse:"安全核心目标。"},
  {subject:"计算机网络",type:"简答题",question:"NAT、DHCP协议的中文名称是什么，其主要作用是什么？",answer:"NAT：网络地址转换，私有IP转公网IP；DHCP：动态主机配置协议，自动分配IP参数。",parse:"常用协议。"},
  {subject:"计算机网络",type:"简答题",question:"服务质量框架中，端到端服务质量保证，主机和路由器需要协同的两项工作。",answer:"1.流量分类与标记；2.拥塞控制与资源预留。",parse:"QoS协同工作。"},
  {subject:"计算机网络",type:"简答题",question:"简要从三个方面说明虚电路和数据报方式的区别。",answer:"1.连接建立：虚电路需建立，数据报无连接；2.路由：虚电路所有分组同路径，数据报独立选路；3.可靠性：虚电路网络保证，数据报端系统保证。",parse:"分组交换两种方式。"},
  {subject:"计算机网络",type:"简答题",question:"网络安全机制最主要的三个方面是什么？",answer:"加密机制（保证机密性）、认证机制（验证身份与完整性）、访问控制机制（限制非授权访问）。",parse:"安全机制三方面。"},
  {subject:"计算机网络",type:"简答题",question:"简述运输层和数据链路层的基本功能。",answer:"运输层：端到端可靠传输、流量控制、拥塞控制；数据链路层：成帧、差错控制、MAC寻址。",parse:"OSI第2、4层功能。"},
  {subject:"计算机网络",type:"综合题",question:"画出OSI/RM参考模型，并简要描述各层功能。",answer:"物理层：比特流传输；数据链路层：成帧与差错控制；网络层：路由与分组转发；传输层：端到端通信；会话层：会话管理；表示层：数据格式转换与加密；应用层：提供网络服务。",parse:"七层模型从上到下。"},
  {subject:"计算机网络",type:"综合题",question:"已知子网掩码255.255.255.240，IP地址A~H，求：(1)可供分配IP数；(2)同一子网分类；(3)地址A所在子网可用IP范围。",answer:"(1)14个；(2)子网13.14.15.16/28：A,B,E；32/28：C,D,G；64/28：H；80/28：F；(3)13.14.15.17~30。",parse:"子网划分经典计算。"},
  {subject:"计算机网络",type:"综合题",question:"ARP协议的功能是什么？简述主机1(10.0.0.2)解析主机2(10.0.0.3)物理地址的工作过程。",answer:"ARP：IP地址→MAC地址。过程：1.查ARP缓存；2.无则广播ARP请求；3.主机2单播应答；4.主机1更新缓存。",parse:"ARP工作原理。"},
  {subject:"计算机网络",type:"综合题",question:"已知数据1010001，生成多项式P(X)=X⁴+X²+X+1，求应添加在数据之后的余数，及实际发出的数据。",answer:"余数：1101；实际发送数据：10100011101。",parse:"CRC校验计算，模2除法。"},
  {subject:"计算机网络",type:"综合题",question:"绘制OSI/RM模型的低三层，指出每层的传输单位，并列出一台设备。",answer:"物理层：比特，集线器；数据链路层：帧，交换机；网络层：分组，路由器。",parse:"低三层PDU与设备。"},
  {subject:"计算机网络",type:"综合题",question:"把二进制IPv4地址转为点分十进制，并给出地址块表示、地址个数和范围。(1)00000001 00000010 10000001 11000101/24 (2)10100001 10001011 10001011 10101111/26",answer:"(1)1.2.129.197，地址块1.2.129.0/24，256个地址，范围1.2.129.0~255；(2)161.139.139.175，地址块161.139.139.128/26，64个地址，范围161.139.139.128~191。",parse:"二进制与十进制转换。"},
  {subject:"计算机网络",type:"综合题",question:"画出电路交换、分组交换和报文交换的过程，并分析其特点。",answer:"电路交换：建立连接→传输→释放，独占信道；报文交换：存储转发完整报文；分组交换：分组存储转发，共享信道，效率高。",parse:"三种交换方式。"},
  {subject:"计算机网络",type:"综合题",question:"地址块158.39.112.0/24分配给三个部门：部门1、2各需50个地址，部门3需100个地址。求各子网前缀、子网掩码、分配地址块、最小最大地址。",answer:"部门3：/25，掩码255.255.255.128，地址块158.39.112.0/25，范围0~127；部门1：/26，掩码255.255.255.192，地址块158.39.112.128/26，范围128~191；部门2：/26，掩码255.255.255.192，地址块158.39.112.192/26，范围192~255。",parse:"变长子网划分。"},
  // 数据结构
  {subject:"数据结构",type:"填空题",question:"两个串的相等，是指两个串的______相等，______相同。",answer:"长度；对应位置的字符",parse:"串相等的充要条件。"},
  {subject:"数据结构",type:"填空题",question:"具有n个顶点的无向完全图中包含有______条边，具有n个顶点的有向完全图中包含有______条边。",answer:"n(n-1)/2；n(n-1)",parse:"组合与排列公式。"},
  {subject:"数据结构",type:"填空题",question:"计算机算法分析的两个主要方面分别是______和______。",answer:"时间复杂度；空间复杂度",parse:"算法效率度量。"},
  {subject:"数据结构",type:"填空题",question:"带权路径长度最小的二叉树称为______树。",answer:"哈夫曼（Huffman）",parse:"最优二叉树。"},
  {subject:"数据结构",type:"填空题",question:"折半查找的存储结构仅限于______，而且是______。",answer:"顺序存储结构；有序的",parse:"二分查找前提。"},
  {subject:"数据结构",type:"填空题",question:"前缀编码是指任一个字符的编码都______另一个字符编码的前缀。",answer:"不是",parse:"前缀特性。"},
  {subject:"数据结构",type:"填空题",question:"设一维数组中有n个数组元素，则读取第i个数组元素的平均时间复杂度为______。",answer:"O(1)",parse:"数组支持随机访问。"},
  {subject:"数据结构",type:"填空题",question:"有一个10阶的对称矩阵，采用以行优先的压缩存储，已知A[1,1]下标为1，则A[8,5]的下标是______。",answer:"33",parse:"公式：i(i-1)/2+j=8×7/2+5=33。"},
  {subject:"数据结构",type:"填空题",question:"a_{i-1}和a_i是线性表中相邻的两个数据元素，a_{i-1}称为a_i的______。",answer:"直接前驱",parse:"前驱后继关系。"},
  {subject:"数据结构",type:"填空题",question:"栈的运算遵循______的原则。",answer:"后进先出（LIFO）",parse:"栈特性。"},
  {subject:"数据结构",type:"填空题",question:"链式存储的特点是利用______来表示数据元素之间的逻辑关系。",answer:"指针（地址）",parse:"指针链接。"},
  {subject:"数据结构",type:"填空题",question:"在各种查找方法中，平均查找长度与结点个数n无关的查找方法是______。",answer:"哈希查找",parse:"理想情况O(1)。"},
  {subject:"数据结构",type:"填空题",question:"串中模式匹配操作Index('DATASTRUCTURE','STR')=______。",answer:"5",parse:"STR首次出现在第5位。"},
  {subject:"数据结构",type:"填空题",question:"在构造哈希表中，不同的关键字产生同一哈希地址的现象称为______。",answer:"冲突（碰撞）",parse:"哈希冲突定义。"},
  {subject:"数据结构",type:"填空题",question:"在具有n个结点的二叉链表中，非空的左右孩子指针域个数为______。",answer:"n-1",parse:"n个结点共2n指针域，n-1条边，故n-1个非空。"},
  {subject:"数据结构",type:"填空题",question:"具有5个顶点的有向完全图有______条弧。",answer:"20",parse:"n(n-1)=5×4=20。"},
  {subject:"数据结构",type:"判断题",question:"对于线性表，如果大量删除和插入，应该选择链式存储结构。（ ）",answer:"√",parse:"链式存储插入删除O(1)。"},
  {subject:"数据结构",type:"判断题",question:"集合只能采用顺序存储结构进行表示。（ ）",answer:"×",parse:"集合可用多种存储方式。"},
  {subject:"数据结构",type:"判断题",question:"队列是一个FIFO模型。（ ）",answer:"√",parse:"先进先出。"},
  {subject:"数据结构",type:"判断题",question:"一个时间复杂度高的算法，其空间复杂度一定很低。（ ）",answer:"×",parse:"时间与空间复杂度无必然联系。"},
  {subject:"数据结构",type:"判断题",question:"二叉排序树的形态与记录的读入顺序无关。（ ）",answer:"×",parse:"完全由插入顺序决定。"},
  {subject:"数据结构",type:"判断题",question:"二叉树是一般树的特殊情形。（ ）",answer:"×",parse:"二叉树和树是不同的数据结构。"},
  {subject:"数据结构",type:"判断题",question:"在线性表的链式存储结构中，逻辑上相邻的两个元素在物理位置上并不一定紧邻。（ ）",answer:"√",parse:"链式存储物理分散。"},
  {subject:"数据结构",type:"判断题",question:"在数组中，插入和删除操作是数组的主要操作。（ ）",answer:"×",parse:"数组主要操作是随机存取。"},
  {subject:"数据结构",type:"判断题",question:"任意广义表都可以分解为表头和表尾两个部分。（ ）",answer:"√",parse:"广义表特性。"},
  {subject:"数据结构",type:"判断题",question:"在散列表中，常用的散列函数可以通过除余法获得。（ ）",answer:"√",parse:"除留余数法最常用。"},
  {subject:"数据结构",type:"判断题",question:"栈和队列的存储方式，既可以是顺序方式，又可以是链式方式。（ ）",answer:"√",parse:"两者均可用顺序或链式存储。"},
  {subject:"数据结构",type:"判断题",question:"顺序存储方式只能用于存储线性结构。（ ）",answer:"√",parse:"顺序存储适用于线性结构。"},
  {subject:"数据结构",type:"判断题",question:"顺序存储结构的主要缺点是不利于插入或删除操作。（ ）",answer:"√",parse:"顺序存储插入删除需移动元素。"},
  {subject:"数据结构",type:"判断题",question:"在具有头结点的单链表中，头指针指向链表的第一个数据结点。（ ）",answer:"×",parse:"头指针指向头结点，不是第一个数据结点。"},

  {subject:"数据结构",type:"选择题",question:"链表不具有的特点是( )。<br>A.插入删除不需要移动元素 B.方便随机访问任一元素 C.不必事先估计存储空间 D.所需空间与线性长度成正比",answer:"B",parse:"链表不支持随机访问。"},

  {subject:"数据结构",type:"选择题",question:"设串s1='ABCDEFG'，s2='PQRST'，函数con(x,y)返回x和y串的连接串，subs(s,i,j)返回串s的从序号i的字符开始的j个字符组成的子串，len(s)返回串s的长度，则con(subs(s1,2,len(s2)), subs(s1,len(s2),2))的结果串是( )。<br>A.BCDEF B.BCDEFG C.BCPQRST D.BCDEFEF",answer:"D",parse:"同上题，BCDEFEF。"},

  {subject:"数据结构",type:"选择题",question:"若一棵二叉树的前序{4,2,1,3,6,5,7}，中序{1,2,3,4,5,6,7}，则下列哪句是错的？( )。<br>A.这是一棵完全二叉树 B.所有的奇数都在叶子结点上 C.这是一棵二叉搜索树 D.2是5的父结点",answer:"D",parse:"5的父亲是6。"},

  {subject:"数据结构",type:"选择题",question:"下列排序算法中，哪种算法可能出现：在最后一趟开始之前，所有的元素都不在其最终的位置上？（设N>2）（ ）。<br>A.冒泡排序 B.插入排序 C.堆排序 D.快速排序",answer:"B",parse:"插入排序过程中元素可能都不在最终位置。"},
  {subject:"数据结构",type:"选择题",question:"若某线性表最常用的操作是存取任一指定序号的元素和在最后进行插入和删除运算，则利用哪种存储方式最节省时间？( )。<br>A.双链表 B.单循环链表 C.带头结点的双循环链表 D.顺序表",answer:"D",parse:"顺序表随机存取O(1)，尾插尾删O(1)。"},
  {subject:"数据结构",type:"选择题",question:"若用大小为6的数组来实现循环队列，当前front和rear的值分别为0和4。当从队列中删除两个元素，再加入两个元素后，front和rear的值分别为多少？( )。<br>A.2和0 B.2和2 C.2和4 D.2和6",answer:"A",parse:"front=(0+2)%6=2；rear=(4+2)%6=0。"},

  {subject:"数据结构",type:"问答题",question:"在单链表、双向链表和单向循环链表中，若仅知道指针p指向某结点，不知道头指针，能否将结点p删除？说明理由。",answer:"单链表：不能（找不到前驱）；双向链表：能（有prev指针）；单向循环链表：能（可遍历找到前驱）。",parse:"三种链表删除特性。"},
  {subject:"数据结构",type:"问答题",question:"已知图的顶点集V={1,2,3,4,5,6,7}，边集E及权值，求最小生成树的边集合并计算权值之和。",answer:"边集合：{(1,2),(4,6),(1,3),(1,4),(2,5),(4,7)}；权值和=50。",parse:"Kruskal或Prim算法。"},
  {subject:"数据结构",type:"问答题",question:"假设Q[0..10]是一个线性队列，初始front=rear=0，经过一系列入队出队操作后，画出队列状态变化，若不能入队请指出元素并说明理由。",answer:"d,e,b,g,h入队→d,e出队→i,j,k,l,m入队→n,o,p不能入队（队列满）。",parse:"线性队列假溢出。"},
  {subject:"数据结构",type:"问答题",question:"写出稀疏矩阵的三元组存储结构示意图。",answer:"(行号,列号,值)三元组表，附总行数、总列数、非零元个数。",parse:"稀疏矩阵压缩存储。"},

  {subject:"数据结构",type:"问答题",question:"用Dijkstra算法求从0顶点出发到其他所有顶点的最短路径长度。",answer:"0→1:1；0→2:3；0→3:6；0→4:7；0→5:9。",parse:"最短路径逐步松弛计算。"},
  {subject:"数据结构",type:"问答题",question:"请回答算法的五个特性。",answer:"有穷性、确定性、可行性、输入、输出。",parse:"算法的基本属性。"},
  {subject:"数据结构",type:"问答题",question:"在双向链表的结点A和B之间插入结点C，写出插入过程；再删除结点C，写出删除过程。",answer:"插入：C->prev=A; C->next=B; A->next=C; B->prev=C；删除：C->prev->next=C->next; C->next->prev=C->prev; free(C)。",parse:"双向链表操作。"},
  {subject:"数据结构",type:"问答题",question:"电文中6种字符频率依次为16,5,9,3,30,1，构造哈夫曼树并计算WPL。",answer:"WPL=129。构造过程：合并最小权值。",parse:"哈夫曼编码基础。"},

  {subject:"数据结构",type:"问答题",question:"画出有向图的邻接表示意图。",answer:"顶点表+边表（邻接点链表）。",parse:"图存储结构。"},
  {subject:"数据结构",type:"问答题",question:"判断序列(56,37,48,24,61,05,16,37)是否为堆，若不是，调整为小顶堆。",answer:"不是堆，调整后：(05,24,16,37,61,48,56,37)。",parse:"堆调整过程。"},
  {subject:"数据结构",type:"问答题",question:"请回答判断算法的好坏标准有哪些？",answer:"正确性、时间复杂度、空间复杂度、可读性、健壮性。",parse:"算法评价五标准。"},
  {subject:"数据结构",type:"问答题",question:"已知关键字{26,19,45,2,50,38,30,5,70,66,58,10}，按顺序插入二叉排序树，画出树。",answer:"根26，左19右45...",parse:"二叉排序树构建。"},

  {subject:"数据结构",type:"算法设计题",question:"假设二叉树采用二叉链表存储，写出统计叶子结点数量的算法。",answer:"int CountLeaf(BiTree T){if(!T)return 0;if(!T->lchild&&!T->rchild)return 1;return CountLeaf(T->lchild)+CountLeaf(T->rchild);}",parse:"递归统计叶子。"},
  {subject:"数据结构",type:"算法设计题",question:"实现对顺序表的就地逆置，即(a1,a2,...,an)逆置为(an,...,a2,a1)。",answer:"for(i=0;i<L.length/2;i++){swap(L.data[i],L.data[L.length-1-i]);}",parse:"双指针交换。"},
  {subject:"数据结构",type:"算法设计题",question:"输入扩充先序序列构建二叉树（#表示空指针），如'AB#C##D##'。",answer:"void CreateBiTree(BiTree &T,char str[]){ ... if(ch=='#')T=NULL; else{...递归构建...} }",parse:"递归建树。"},
  {subject:"数据结构",type:"算法设计题",question:"用前插法建立单链表，接收用户输入若干个整数。",answer:"LNode *p; p->data=x; p->next=L->next; L->next=p;",parse:"头插法逆序建表。"},
  {subject:"数据结构",type:"算法设计题",question:"已知顺序表递增有序，插入元素x并保持有序。",answer:"找到插入位置→元素后移→插入x→长度+1；时间复杂度O(n)。",parse:"有序插入。"},
  {subject:"数据结构",type:"算法设计题",question:"设计算法求二叉链表存储的二叉树深度。",answer:"int Depth(BiTree T){if(!T)return 0;return max(Depth(T->lchild),Depth(T->rchild))+1;}",parse:"递归求深度。"},
  {subject:"数据结构",type:"算法设计题",question:"编写计算带头结点的单链表中结点个数的算法，并打印元素值。",answer:"int count=0; p=L->next; while(p){count++;printf('%d ',p->data);p=p->next;}",parse:"遍历计数。"},
  {subject:"数据结构",type:"算法设计题",question:"写出起泡排序（冒泡排序）的算法。",answer:"void BubbleSort(int a[],int n){for(i=0;i<n-1;i++){for(j=0;j<n-1-i;j++){if(a[j]>a[j+1])swap(a[j],a[j+1]);}}}",parse:"冒泡排序代码。"},
  // 操作系统
  {subject:"操作系统",type:"选择题",question:"在计算机系统中，操作系统是（ ）。<br>A.一般程序 B.核心系统软件 C.用户应用软件 D.系统支撑软件",answer:"B",parse:"操作系统是核心系统软件。"},
  {subject:"操作系统",type:"选择题",question:"以下各个存储管理系统中，______是虚拟存储管理系统。<br>A.动态分区存储管理 B.请求分段式存储管理 C.基本分页式存储管理 D.基本段页式存储管理",answer:"B",parse:"请求分段/分页才有虚拟存储。"},
  {subject:"操作系统",type:"选择题",question:"进程与程序的重要区别之一是（ ）。<br>A.程序有状态而进程没有 B.进程有状态而程序没有 C.程序可占有资源而进程不能 D.进程占有资源而程序不能",answer:"B",parse:"进程动态，程序静态。"},
  {subject:"操作系统",type:"选择题",question:"一个分段存储管理系统中，地址长度为32位，其中段号占8位，则最大段长是（ ）。<br>A.2⁸字节 B.2¹⁶字节 C.2²⁴字节 D.2³²字节",answer:"C",parse:"段内偏移=32-8=24位，最大段长2^24。"},
  {subject:"操作系统",type:"选择题",question:"操作系统中，死锁出现指的是（ ）。<br>A.计算机系统发生重大故障 B.资源数目远远小于进程数 C.若干进程因竞争资源而无限等待其他进程释放已占有的资源 D.进程同时申请的资源数超过资源总数",answer:"C",parse:"死锁定义：互相等待的僵局。"},
  {subject:"操作系统",type:"选择题",question:"文件的组织的最小单位（ ）。<br>A.文件 B.数据项 C.记录 D.索引",answer:"B",parse:"数据项是最小逻辑单位。"},
  {subject:"操作系统",type:"选择题",question:"在以下存储管理方案中，不适用于多道程序设计系统的是（ ）。<br>A.单用户连续分配 B.固定式分区分配 C.可变式分区分配 D.页式存储管理",answer:"A",parse:"单用户连续分配只能容纳一道程序。"},
  {subject:"操作系统",type:"选择题",question:"当一个进程在等待一个I/O操作，但I/O操作还没有完成，此时这个进程处于（ ）。<br>A.就绪状态 B.运行状态 C.阻塞状态 D.撤销状态",answer:"C",parse:"等待I/O属于阻塞态。"},
  {subject:"操作系统",type:"选择题",question:"操作系统的基本类型主要有（ ）。<br>A.批处理操作系统、分时系统及多任务系统 B.实时操作系统、批处理操作系统及分时操作系统 C.单用户系统、多用户系统及批处理系统 D.实时系统、分时系统和多用户系统",answer:"B",parse:"三大基本类型。"},
  {subject:"操作系统",type:"选择题",question:"在页式虚拟存储管理方案中，下面______完成将页面调入内存的工作。<br>A.缺页中断处理 B.页面淘汰过程 C.工作集模型应用 D.紧凑技术利用",answer:"A",parse:"缺页中断处理程序调入页面。"},
  {subject:"操作系统",type:"选择题",question:"在某系统中有4个并发进程，都需要同类资源5个，则不会发生死锁的最少资源数为______个。<br>A.20 B.9 C.17 D.12",answer:"C",parse:"4×(5-1)+1=17。"},
  {subject:"操作系统",type:"选择题",question:"不会产生内部碎片的是存储管理是（ ）。<br>A.分页存储管理 B.分段存储管理 C.固定分区存储管理 D.段页式存储管理",answer:"B",parse:"分段无内部碎片，有外部碎片。"},
  {subject:"操作系统",type:"选择题",question:"在操作系统中，用户使用I/O设备时，通常采用（ ）。<br>A.物理设备名 B.逻辑设备名 C.虚拟设备名 D.独占设备名",answer:"B",parse:"逻辑设备名独立于物理设备。"},
  {subject:"操作系统",type:"选择题",question:"对磁盘进行移动臂调度，是为了缩短______时间。<br>A.寻道 B.延迟 C.传送 D.启动",answer:"A",parse:"移动臂调度优化磁道顺序，缩短寻道时间。"},
  {subject:"操作系统",type:"选择题",question:"文件系统采用树状目录结构后，对不同用户的文件，文件名（ ）。<br>A.应该不同 B.可以相同，也可以不同 C.受系统约束 D.由操作系统类型决定",answer:"B",parse:"不同目录下文件名可相同。"},
  {subject:"操作系统",type:"选择题",question:"设磁盘转速为3000转/分，盘面划分为10个扇区，则读取一个扇区的时间为（ ）。<br>A.20ms B.5ms C.2ms D.1ms",answer:"C",parse:"20ms/10=2ms。"},
  {subject:"操作系统",type:"选择题",question:"若有3个进程共享一个互斥段，每次最多允许2个进程进入互斥段，则信号量变化范围是（ ）。<br>A.2,1,0,-1 B.3,2,1,0 C.2,1,0,-1,-2 D.1,0,-1,-2",answer:"A",parse:"信号量初值2。"},
  {subject:"操作系统",type:"选择题",question:"配置了操作系统的计算机是一台比原来的物理计算机功能更强的计算机，这样的计算机只是一台逻辑上的计算机，被称为______计算机。<br>A.并行 B.真实 C.虚拟 D.共享",answer:"C",parse:"虚拟计算机。"},
  {subject:"操作系统",type:"选择题",question:"在多进程的系统中，各进程应互斥的进入临界区，临界区本质上是（ ）。<br>A.一个缓冲区 B.一段共享数据区 C.一段程序 D.一个互斥资源",answer:"C",parse:"临界区是代码段。"},
  {subject:"操作系统",type:"选择题",question:"死锁的4个必要条件中，无法破坏的是（ ）。<br>A.循环等待资源 B.互斥使用资源 C.占有且等待资源 D.非剥夺分配资源",answer:"B",parse:"互斥由资源属性决定，无法破坏。"},
  {subject:"操作系统",type:"选择题",question:"不死锁最少资源数：3个进程各需4个同类资源，最少需（ ）个资源。<br>A.8 B.9 C.10 D.11",answer:"C",parse:"3×(4-1)+1=10。"},
  {subject:"操作系统",type:"选择题",question:"重定位是指（ ）。<br>A.将程序从外存调入内存 B.将逻辑地址转换为物理地址 C.修改指令 D.分配内存",answer:"B",parse:"地址转换。"},
  {subject:"操作系统",type:"选择题",question:"磁带是（ ）设备。<br>A.随机存取 B.直接存取 C.索引存取 D.顺序存取",answer:"D",parse:"磁带只能顺序访问。"},
  {subject:"操作系统",type:"选择题",question:"在抢占式优先数调度算法中，任何时候占用CPU的进程是（ ）。<br>A.优先级最高的 B.最先进入内存的 C.运行时间最短的 D.等待时间最长的",answer:"A",parse:"抢占式保证最高优先级运行。"},
  {subject:"操作系统",type:"选择题",question:"引入进程不能（ ）。<br>A.提高CPU利用率 B.提高I/O效率 C.提高资源利用率 D.提高编程能力",answer:"D",parse:"进程与编程能力无关。"},
  {subject:"操作系统",type:"选择题",question:"下列不属于进程控制的是（ ）。<br>A.创建进程 B.撤销进程 C.P/V操作 D.阻塞进程",answer:"C",parse:"P/V是同步互斥工具。"},
  {subject:"操作系统",type:"选择题",question:"银行家算法属于（ ）。<br>A.预防死锁 B.避免死锁 C.检测死锁 D.解除死锁",answer:"B",parse:"通过安全状态避免死锁。"},
  {subject:"操作系统",type:"选择题",question:"二级目录结构是为了解决（ ）。<br>A.文件重名 B.文件共享 C.文件保护 D.文件加密",answer:"A",parse:"不同用户目录可重名。"},
  {subject:"操作系统",type:"选择题",question:"信号量初值为2，当前值为-1，则等待进程数为（ ）。<br>A.0 B.1 C.2 D.3",answer:"B",parse:"绝对值=1。"},
  {subject:"操作系统",type:"选择题",question:"临界区是（ ）。<br>A.缓冲区 B.共享数据区 C.程序段 D.互斥资源",answer:"C",parse:"访问临界资源的代码段。"},
  {subject:"操作系统",type:"选择题",question:"作业周转时间指（ ）。<br>A.作业等待时间 B.作业执行时间 C.作业等待+执行时间 D.从提交到完成的时间",answer:"D",parse:"周转时间定义。"},
  {subject:"操作系统",type:"选择题",question:"进程的（ ）是进程存在的唯一标志。<br>A.程序 B.数据 C.进程控制块 D.栈",answer:"C",parse:"PCB唯一标识进程。"},
  {subject:"操作系统",type:"选择题",question:"批处理操作系统的主要目标是（ ）。<br>A.提高系统资源利用率 B.实时响应 C.人机交互 D.方便用户",answer:"A",parse:"批处理追求吞吐量。"},
  {subject:"操作系统",type:"选择题",question:"原语的特点是（ ）。<br>A.执行速度快 B.执行不可分割 C.可并发执行 D.可中断",answer:"B",parse:"原子操作，不可中断。"},
  {subject:"操作系统",type:"选择题",question:"段页式存储管理中，一个作业对应（ ）。<br>A.一个段表和一个页表 B.多个段表和多个页表 C.一个段表和多个页表 D.多个段表和一个页表",answer:"C",parse:"每个段一个页表。"},
  {subject:"操作系统",type:"选择题",question:"分时系统最常用的调度算法是（ ）。<br>A.FCFS B.时间片轮转 C.SJF D.高响应比优先",answer:"B",parse:"分时系统用时间片轮转。"},
  {subject:"操作系统",type:"选择题",question:"文件系统是指（ ）。<br>A.文件的集合 B.文件的目录 C.实现文件管理的一组软件 D.文件、管理软件的集合",answer:"D",parse:"文件系统完整定义。"},
  {subject:"操作系统",type:"选择题",question:"响应比公式为（ ）。<br>A.(等待时间+运行时间)/运行时间 B.(等待时间+运行时间)/等待时间 C.等待时间/运行时间 D.运行时间/等待时间",answer:"A",parse:"响应比=(W+T)/T。"},
  {subject:"操作系统",type:"判断题",question:"在页式存储管理方案中，为了提高内存的利用率，允许同时使用不同大小的页面。（ ）",answer:"×",parse:"页面大小固定。"},
  {subject:"操作系统",type:"判断题",question:"虚拟存储器实际上是一种设计技巧，使主存物理容量得到扩大。（ ）",answer:"×",parse:"只扩大逻辑地址空间。"},
  {subject:"操作系统",type:"判断题",question:"作业的周转时间和平均周转时间与选用的调度算法有关。（ ）",answer:"√",parse:"调度算法影响完成时间。"},
  {subject:"操作系统",type:"判断题",question:"在进程状态的转换中，从就绪态转换到阻塞态是不可能实现的。（ ）",answer:"√",parse:"就绪态只能转为运行态。"},
  {subject:"操作系统",type:"判断题",question:"在设备I/O中引入缓冲技术的目的是为了节省内存。（ ）",answer:"×",parse:"目的是缓解速度不匹配。"},
  {subject:"操作系统",type:"判断题",question:"磁盘访问时间的优化实际上优化的数据读取时间。（ ）",answer:"×",parse:"优化寻道和旋转延迟。"},
  {subject:"操作系统",type:"判断题",question:"与多道批处理系统相比，分时系统增加了人机交互的能力。（ ）",answer:"√",parse:"分时系统交互性强。"},
  {subject:"操作系统",type:"判断题",question:"动态优先级算法允许进程的优先级在运行期间不断改变。（ ）",answer:"√",parse:"动态优先级特征。"},
  {subject:"操作系统",type:"判断题",question:"作业调度选中一个作业后，与该作业相关的进程即占有CPU运行。（ ）",answer:"×",parse:"仅进入就绪队列，需进程调度。"},
  {subject:"操作系统",type:"判断题",question:"页式存储管理中，一个作业可占用不连续的内存空间，而段式管理，一个作业则占用连续的内存空间。（ ）",answer:"×",parse:"段式各段可不连续。"},
  {subject:"操作系统",type:"判断题",question:"段式管理中每个段占用连续内存，不同段可分散。（ ）",answer:"√",parse:"正确。"},
  {subject:"操作系统",type:"判断题",question:"虚拟存储器仅逻辑扩充地址空间，物理容量不变。（ ）",answer:"√",parse:"正确。"},
  {subject:"操作系统",type:"判断题",question:"引入缓冲并非为了节省内存。（ ）",answer:"√",parse:"正确。"},
  {subject:"操作系统",type:"判断题",question:"阻塞态只能先转为就绪态，不能直接运行。（ ）",answer:"√",parse:"正确。"},
  {subject:"操作系统",type:"判断题",question:"作业调度是高级调度，进程调度是低级调度。（ ）",answer:"√",parse:"正确。"},
  {subject:"操作系统",type:"判断题",question:"分页逻辑地址一维，分段逻辑地址二维。（ ）",answer:"√",parse:"正确。"},
  {subject:"操作系统",type:"判断题",question:"阻塞进程自身无法唤醒自己。（ ）",answer:"√",parse:"正确。"},
  {subject:"操作系统",type:"判断题",question:"共享设备是指同一时刻多个作业使用。（ ）",answer:"×",parse:"同一时刻只能一个作业用。"},
  {subject:"操作系统",type:"判断题",question:"进程被唤醒后立即运行说明是剥夺式调度。（ ）",answer:"×",parse:"不一定，可能无其他就绪进程。"},
  {subject:"操作系统",type:"判断题",question:"段页式管理分段由用户决定，分页由系统自动。（ ）",answer:"√",parse:"正确。"},
  {subject:"操作系统",type:"判断题",question:"PCB是进程存在的唯一标志。（ ）",answer:"√",parse:"正确。"},
  {subject:"操作系统",type:"判断题",question:"信号量值永远代表可用资源数。（ ）",answer:"×",parse:"小于0代表等待进程数。"},
  {subject:"操作系统",type:"判断题",question:"分段比分页更易于动态扩充内存。（ ）",answer:"√",parse:"正确。"},
  {subject:"操作系统",type:"判断题",question:"LRU算法淘汰驻留时间最长的页面。（ ）",answer:"×",parse:"FIFO才是，LRU淘汰最近最少用。"},
  {subject:"操作系统",type:"判断题",question:"无快表时段页式存取需3次访存。（ ）",answer:"√",parse:"段表+页表+数据。"},
  {subject:"操作系统",type:"判断题",question:"信号量初值必须≥0。（ ）",answer:"√",parse:"正确。"},
  {subject:"操作系统",type:"判断题",question:"设备独立性指使用逻辑设备名。（ ）",answer:"√",parse:"正确。"},
  {subject:"操作系统",type:"判断题",question:"对换空间采用离散分配。（ ）",answer:"×",parse:"采用连续分配提高I/O速度。"},
  {subject:"操作系统",type:"判断题",question:"不安全状态一定死锁。（ ）",answer:"×",parse:"不一定，有概率。"},
  {subject:"操作系统",type:"判断题",question:"实时系统核心是作业周转时间。（ ）",answer:"×",parse:"实时系统核心是截止时间。"},
  {subject:"操作系统",type:"问答题",question:"操作系统的主要特征有哪些？",answer:"并发、共享、虚拟、异步。并发共享是最核心特征。",parse:"四大特征。"},
  {subject:"操作系统",type:"问答题",question:"什么是高级调度？什么是中级调度？什么是低级调度？它们各有什么特点？",answer:"高级调度：作业调度，频率低；中级调度：内存调度，频率中；低级调度：进程调度，频率最高。",parse:"三级调度。"},
  {subject:"操作系统",type:"问答题",question:"什么是物理地址和物理地址空间？它们和逻辑地址空间有什么关系？",answer:"物理地址：内存实际地址；逻辑地址：进程虚地址；通过地址映射转换。",parse:"地址概念。"},
  {subject:"操作系统",type:"问答题",question:"什么是通道？引入通道的目的是什么？",answer:"通道：专门I/O处理器。目的：解放CPU，实现CPU、通道、设备并行。",parse:"通道技术。"},
  {subject:"操作系统",type:"问答题",question:"什么是文件的逻辑结构？什么是文件的物理结构？",answer:"逻辑结构：用户视角（流式/记录式）；物理结构：外存存储方式（连续/链接/索引）。",parse:"文件结构。"},
  {subject:"操作系统",type:"问答题",question:"比较并发与并行的概念。",answer:"并行：同一时刻同时执行；并发：同一时间间隔内交替执行。",parse:"并发并行区别。"},
  {subject:"操作系统",type:"问答题",question:"进程访问临界区应遵循哪些基本原则？",answer:"空闲让进、忙则等待、有限等待、让权等待。",parse:"临界区访问原则。"},
  {subject:"操作系统",type:"问答题",question:"简述SPOOLing技术的含义。",answer:"假脱机技术：将独占设备虚拟为共享设备，输入/输出井。",parse:"SPOOLing。"},
  {subject:"操作系统",type:"问答题",question:"什么是死锁？产生死锁的原因和必要条件是什么？",answer:"死锁：进程因竞争资源互相等待的僵局。原因：资源不足、推进顺序非法。必要条件：互斥、占有且等待、非剥夺、循环等待。",parse:"死锁。"},
  {subject:"操作系统",type:"问答题",question:"什么是索引节点？它与文件控制块的区别是什么？",answer:"索引节点：存放元数据不含文件名。区别：FCB含文件名，检索效率低。",parse:"inode。"},
  {subject:"操作系统",type:"问答题",question:"进程具有哪些基本特征？",answer:"动态性、并发性、独立性、异步性、结构性。",parse:"进程特征。"},
  {subject:"操作系统",type:"问答题",question:"虚拟存储器有些什么特征？其中最根本的特征是什么？",answer:"多次性、对换性、虚拟性、离散性。最根本：多次性。",parse:"虚拟存储特征。"},

// ==================== 脚本逻辑 ====================
let currentFilter = 'all';
let searchKeyword = '';
let userAnswers = {};

// 选择题选项解析（兼容 <br> 分隔和空格分隔）
function parseChoiceQuestion(text) {
    const parts = text.split(/<br\s*\/?>/);
    const stem = parts[0].trim();
    const options = [];
    for (let i = 1; i < parts.length; i++) {
        const line = parts[i].trim();
        if (!line) continue;
        const optionMarkers = line.match(/[A-Z][.．、]/g);
        if (optionMarkers && optionMarkers.length >= 1) {
            const splitOptions = line.split(/\s*(?=[A-Z][.．、])/).filter(s => s.trim());
            splitOptions.forEach(opt => {
                const m = opt.match(/^([A-Z])[.．、]\s*(.*)/);
                if (m) {
                    options.push({ label: m[1], content: m[2].trim() });
                }
            });
        }
    }
    return { stem, options };
}

function renderCards() {
    const filtered = getFiltered();
    document.getElementById('stats').innerHTML = `<span>当前显示 ${filtered.length} 题 / 共 ${ALL_QUESTIONS.length} 题</span>`;
    const container = document.getElementById('card-container');
    if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state">😶 没有匹配的题目</div>';
        return;
    }
    container.innerHTML = filtered.map((q, idx) => {
        const globalIdx = ALL_QUESTIONS.indexOf(q);
        const tagClass = q.subject === '计算机网络' ? 'tag-net' : q.subject === '数据结构' ? 'tag-ds' : 'tag-os';
        const saved = userAnswers[globalIdx];
        let answerHtml = '';
        const type = q.type;

        if (type === '选择题') {
            const { stem, options } = parseChoiceQuestion(q.question);
            const isMulti = q.answer.length > 1;
            answerHtml = `<div class="question">${stem}</div>`;
            if (options.length > 0) {
                const optBtns = options.map(opt => {
                    let cls = 'opt-btn';
                    let disabled = '';
                    if (saved && saved.answered) {
                        disabled = 'disabled';
                        if (saved.userAnswer && saved.userAnswer.includes(opt.label)) {
                            if (q.answer.includes(opt.label) && saved.userAnswer.split('').sort().join('') === q.answer.split('').sort().join('')) {
                                cls += ' correct';
                            } else if (!q.answer.includes(opt.label)) {
                                cls += ' wrong';
                            }
                        }
                    }
                    return `<button class="${cls}" ${disabled} onclick="handleOptionClick(${globalIdx}, '${opt.label}', this)">${opt.label}. ${opt.content}</button>`;
                }).join('');
                answerHtml += `<div class="options">${optBtns}</div>`;
                if (isMulti && !saved?.answered) {
                    answerHtml += '<button class="btn small" onclick="submitMultiChoice(' + globalIdx + ')">✅ 提交答案（多选）</button>';
                }
                if (saved && saved.answered) {
                    const correctOpts = q.answer.split('').map(c => options.find(o => o.label === c)?.content).join(', ');
                    answerHtml += `<div class="feedback ${saved.correct ? 'success' : 'fail'}">${saved.correct ? '🎉 恭喜你，选对了！' : '💪 可惜了，加油！正确答案是：' + q.answer + '（' + correctOpts + '）'}</div>`;
                }
            }
        } else if (type === '判断题') {
            answerHtml = `<div class="question">${q.question}</div>`;
            answerHtml += `<div class="actions">`;
            const judgeBtns = [
                { label: '正确', value: '√' },
                { label: '错误', value: '×' }
            ];
            judgeBtns.forEach(j => {
                let cls = 'btn small';
                if (saved && saved.answered) {
                    cls += (j.value === q.answer) ? ' correct' : '';
                    if (saved.userAnswer === j.value && j.value !== q.answer) cls += ' wrong';
                }
                answerHtml += `<button class="${cls}" ${saved?.answered ? 'disabled' : ''} onclick="handleJudge(${globalIdx}, '${j.value}', this)">${j.label}</button>`;
            });
            answerHtml += `</div>`;
            if (saved && saved.answered) {
                answerHtml += `<div class="feedback ${saved.correct ? 'success' : 'fail'}">${saved.correct ? '🎉 恭喜你，选对了！' : '💪 可惜了，加油！正确答案是：' + q.answer}</div>`;
            }
        } else if (type === '填空题') {
            answerHtml = `<div class="question">${q.question}</div>`;
            answerHtml += `<input type="text" class="answer-input" placeholder="请输入你的答案" id="fill-${globalIdx}" ${saved?.answered ? 'disabled' : ''} value="${saved?.userAnswer || ''}">`;
            if (!saved?.answered) {
                answerHtml += `<button class="btn small" onclick="handleFill(${globalIdx})">✅ 提交</button>`;
            }
            if (saved && saved.answered) {
                answerHtml += `<div class="feedback ${saved.correct ? 'success' : 'fail'}">${saved.correct ? '🎉 正确！' : '💪 可惜了，正确答案是：' + q.answer}</div>`;
            }
        } else {
            answerHtml = `<div class="question">${q.question}</div>`;
            answerHtml += `<textarea class="answer-input" rows="3" placeholder="请输入你的回答（提交后自行对照答案）" id="essay-${globalIdx}" ${saved?.answered ? 'disabled' : ''}>${saved?.userAnswer || ''}</textarea>`;
            if (!saved?.answered) {
                answerHtml += `<button class="btn small" onclick="handleEssay(${globalIdx})">📝 提交回答（查看答案）</button>`;
            }
            if (saved && saved.answered) {
                answerHtml += `<div class="feedback" style="color:#636e72;">📌 你的回答已提交，请对照标准答案。</div>`;
            }
        }

        const answerWrap = `
            <div class="answer-wrap">
                <div class="ans-label">✅ 标准答案：</div>
                <div>${q.answer}</div>
                ${q.parse ? `<div style="margin-top:8px;color:#636e72;">🔍 解析：${q.parse}</div>` : ''}
            </div>`;

        return `
        <div class="card" id="card-${globalIdx}">
            <span class="subject-tag ${tagClass}">${q.subject}</span>
            <div class="q-type">${q.type}</div>
            ${answerHtml}
            ${answerWrap}
            <div class="actions">
                <button class="btn small" onclick="toggleAnswer(${globalIdx})">👁️ 显示/隐藏答案</button>
            </div>
        </div>`;
    }).join('');
}

function handleOptionClick(idx, label, btn) {
    const q = ALL_QUESTIONS[idx];
    const isMulti = q.answer.length > 1;
    if (isMulti) {
        btn.classList.toggle('selected');
        btn.style.background = btn.classList.contains('selected') ? '#e0e0ff' : '';
        if (!userAnswers[idx]) userAnswers[idx] = { answered: false, userAnswer: '' };
        return;
    } else {
        const correct = q.answer === label;
        userAnswers[idx] = { answered: true, userAnswer: label, correct: correct };
        const card = document.getElementById('card-' + idx);
        card.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
        if (correct) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
            card.querySelectorAll('.opt-btn').forEach(b => {
                if (q.answer.includes(b.textContent.charAt(0))) b.classList.add('correct');
            });
        }
    }
}

function submitMultiChoice(idx) {
    const q = ALL_QUESTIONS[idx];
    const card = document.getElementById('card-' + idx);
    const selectedBtns = card.querySelectorAll('.opt-btn.selected');
    const userAnswer = Array.from(selectedBtns).map(b => b.textContent.charAt(0)).sort().join('');
    const correctAnswer = q.answer.split('').sort().join('');
    const correct = userAnswer === correctAnswer;
    userAnswers[idx] = { answered: true, userAnswer: userAnswer, correct: correct };
    card.querySelectorAll('.opt-btn').forEach(b => {
        b.disabled = true;
        const label = b.textContent.charAt(0);
        if (q.answer.includes(label)) b.classList.add('correct');
        if (userAnswer.includes(label) && !q.answer.includes(label)) b.classList.add('wrong');
    });
}

function handleJudge(idx, value, btn) {
    const q = ALL_QUESTIONS[idx];
    const correct = (value === q.answer);
    userAnswers[idx] = { answered: true, userAnswer: value, correct: correct };
    const card = document.getElementById('card-' + idx);
    card.querySelectorAll('.btn').forEach(b => b.disabled = true);
    if (correct) {
        btn.classList.add('correct');
    } else {
        btn.classList.add('wrong');
        card.querySelectorAll('.btn').forEach(b => {
            if (b.textContent === (q.answer === '√' ? '正确' : '错误')) b.classList.add('correct');
        });
    }
}

function handleFill(idx) {
    const input = document.getElementById('fill-' + idx);
    const userAnswer = input.value.trim();
    const q = ALL_QUESTIONS[idx];
    const correct = normalizeAnswer(userAnswer) === normalizeAnswer(q.answer);
    userAnswers[idx] = { answered: true, userAnswer: userAnswer, correct: correct };
    input.disabled = true;
}

function handleEssay(idx) {
    const textarea = document.getElementById('essay-' + idx);
    const userAnswer = textarea.value.trim();
    userAnswers[idx] = { answered: true, userAnswer: userAnswer, correct: null };
    textarea.disabled = true;
}

function normalizeAnswer(str) {
    return str.replace(/\s+/g, '').toLowerCase();
}

function toggleAnswer(idx) {
    document.getElementById('card-' + idx).classList.toggle('show-answer');
}

function showAllAnswers() {
    document.querySelectorAll('.card').forEach(c => c.classList.add('show-answer'));
}

function resetAll() {
    userAnswers = {};
    document.querySelectorAll('.card').forEach(c => c.classList.remove('show-answer'));
    renderCards();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function randomOne() {
    const filtered = getFiltered();
    if (filtered.length === 0) return;
    const randomQ = filtered[Math.floor(Math.random() * filtered.length)];
    const idx = ALL_QUESTIONS.indexOf(randomQ);
    const card = document.getElementById('card-' + idx);
    if (card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.style.boxShadow = '0 0 0 3px var(--accent2)';
        setTimeout(() => { card.style.boxShadow = ''; }, 2000);
    }
}

function toggleTheme() {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme');
    html.setAttribute('data-theme', current === 'dark' ? '' : 'dark');
    localStorage.setItem('theme', current === 'dark' ? '' : 'dark');
}
(function() {
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
})();

function filterSubject(subj, btn) {
    currentFilter = subj;
    document.querySelectorAll('.tag-group .btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    renderCards();
}

function searchQuestions(val) {
    searchKeyword = val.trim();
    renderCards();
}

function getFiltered() {
    let filtered = ALL_QUESTIONS;
    if (currentFilter !== 'all') {
        filtered = filtered.filter(q => q.subject === currentFilter);
    }
    if (searchKeyword) {
        const kw = searchKeyword.toLowerCase();
        filtered = filtered.filter(q => 
            q.question.toLowerCase().includes(kw) || q.answer.toLowerCase().includes(kw)
        );
    }
    return filtered;
}

renderCards();
</script>
