<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三科在线答题系统</title>
    <style>
        :root {
            --bg: #f5f6fa; --card-bg: #ffffff; --text: #2d3436; --border: #e0e0e0;
            --accent: #6c5ce7; --accent2: #00b894; --wrong: #e17055;
            --shadow: 0 2px 8px rgba(0,0,0,0.06); --hover: #f8f9fa;
        }
        [data-theme="dark"] {
            --bg: #1a1a2e; --card-bg: #16213e; --text: #e0e0e0; --border: #2a2a4a;
            --accent: #a29bfe; --accent2: #55efc4; --wrong: #fab1a0;
            --shadow: 0 2px 12px rgba(0,0,0,0.3); --hover: #1a2744;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
        }
        header {
            background: var(--card-bg); border-bottom: 1px solid var(--border);
            padding: 12px 20px; position: sticky; top: 0; z-index: 100;
            box-shadow: var(--shadow); display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
        }
        header h1 {
            font-size: 1.2rem; font-weight: 700; margin-right: auto;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .btn {
            padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px;
            cursor: pointer; font-size: 0.85rem; font-weight: 600; background: var(--card-bg);
            color: var(--text); transition: all 0.2s; white-space: nowrap;
        }
        .btn:hover { background: var(--hover); }
        .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn.accent2 { background: var(--accent2); color: #000; border-color: var(--accent2); }
        .tag-group { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
        main { max-width: 1000px; margin: 0 auto; padding: 16px; }
        .stats-bar {
            display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px;
            font-size: 0.85rem; color: #636e72;
        }
        .stats-bar span {
            background: var(--card-bg); padding: 6px 12px; border-radius: 20px;
            border: 1px solid var(--border);
        }
        .card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; margin-bottom: 12px;
            box-shadow: var(--shadow); transition: all 0.2s;
        }
        .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .subject-tag {
            display: inline-block; font-size: 0.7rem; font-weight: 700;
            padding: 3px 8px; border-radius: 4px; margin-bottom: 8px;
        }
        .tag-net { background: #74b9ff; color:#fff; }
        .tag-ds { background: #fdcb6e; color:#000; }
        .tag-os { background: #e17055; color:#fff; }
        .q-type { font-size: 0.75rem; color: #636e72; margin-bottom: 4px; }
        .question { font-weight: 600; font-size: 1rem; margin-bottom: 12px; line-height: 1.6; }
        /* 答题区域 */
        .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        .opt-btn {
            display: block; width: 100%; text-align: left; padding: 10px 16px;
            border: 1px solid var(--border); border-radius: 8px;
            background: var(--card-bg); color: var(--text);
            cursor: pointer; transition: 0.2s; font-size: 0.9rem;
        }
        .opt-btn:hover { background: var(--hover); }
        .opt-btn.correct { background: #d4edda; border-color: #28a745; color: #155724; }
        .opt-btn.wrong { background: #f8d7da; border-color: #dc3545; color: #721c24; }
        .opt-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        /* 判断题按钮正确/错误样式 */
        .btn.correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724 !important; }
        .btn.wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24 !important; }
        .feedback { font-weight: 700; margin-bottom: 8px; }
        .feedback.success { color: #28a745; }
        .feedback.fail { color: #dc3545; }
        .answer-input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.9rem; background: var(--card-bg); color: var(--text); margin-bottom: 8px; }
        .answer-wrap {
            display: none; margin-top: 12px; padding: 14px;
            background: #f0fff4; border-left: 3px solid var(--accent2);
            border-radius: 0 8px 8px 0; font-size: 0.9rem; line-height: 1.7;
        }
        [data-theme="dark"] .answer-wrap { background: #0d3322; }
        .card.show-answer .answer-wrap { display: block; }
        .ans-label { font-weight: 700; color: var(--accent2); margin-bottom: 4px; }
        .actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .search-box {
            width: 100%; max-width: 400px; padding: 8px 12px;
            border: 1px solid var(--border); border-radius: 8px;
            font-size: 0.9rem; background: var(--card-bg); color: var(--text);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<header>
    <h1>📚 三科在线答题系统</h1>
    <button class="btn small" onclick="toggleTheme()">🌓 夜间模式</button>
    <button class="btn small" onclick="randomOne()">🎲 随机一题</button>
    <button class="btn small accent2" onclick="resetAll()">🔄 全部重置</button>
    <button class="btn small accent2" onclick="showAllAnswers()">📖 全部答案</button>
</header>
<main>
    <input type="text" class="search-box" placeholder="🔍 搜索题目关键词..." oninput="searchQuestions(this.value)">
    <div class="tag-group">
        <button class="btn active" onclick="filterSubject('all', this)">📋 全部</button>
        <button class="btn" onclick="filterSubject('计算机网络', this)">🌐 计算机网络</button>
        <button class="btn" onclick="filterSubject('数据结构', this)">🌳 数据结构</button>
        <button class="btn" onclick="filterSubject('操作系统', this)">⚙️ 操作系统</button>
    </div>
<div class="type-group" style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px;">
    <button class="btn active" onclick="filterType('all', this)">📋 全部题型</button>
    <button class="btn" onclick="filterType('判断题', this)">判断题</button>
    <button class="btn" onclick="filterType('选择题', this)">选择题</button>
    <button class="btn" onclick="filterType('填空题', this)">填空题</button>
    <button class="btn" onclick="filterType('问答题', this)">问答题</button>
    <button class="btn" onclick="filterType('简答题', this)">简答题</button>
    <button class="btn" onclick="filterType('综合题', this)">综合题</button>
    <button class="btn" onclick="filterType('算法设计题', this)">算法设计题</button>
</div>
    <div class="stats-bar" id="stats"></div>
    <div id="card-container"></div>
</main>
<script>
// ==================== 完整题目数据（全部保留，不在此展示全部，省略号表示继续） ====================
const ALL_QUESTIONS = [
  // ==================== 数据结构 ====================
  // 判断题
  {subject:"数据结构",type:"判断题",question:"栈和队列的存储方式，既可以是顺序方式，也可以是链式方式。（ ）",answer:"√",parse:"栈可实现为顺序栈（数组）、链栈（链表）；队列可实现为顺序队列（循环数组）、链队列（链表），两种存储方式均适用。"},
  {subject:"数据结构",type:"判断题",question:"通过对堆栈 S 操作：Push(S,1), Push(S,2), Pop(S), Push(S,3), Pop(S), Pop(S)。输出的序列为：123。（ ）",answer:"×",parse:"操作过程：Push1→Push2→Pop(输出2)→Push3→Pop(输出3)→Pop(输出1)，最终序列为231。"},
  {subject:"数据结构",type:"判断题",question:"在线性表的顺序存储结构中可实现快速的随机存取，而在链式存储结构中则只能进行顺序存取。（ ）",answer:"√",parse:"顺序存储通过下标直接访问（O(1)随机存取）；链式存储需从表头遍历（O(n)顺序存取）。"},
  {subject:"数据结构",type:"判断题",question:"广义表 LS＝((a,b,c),(d,(e),f)) 的长度和深度都是 2。（ ）",answer:"×",parse:"广义表长度为顶层元素个数（2），深度为括号最大嵌套层数（3），子表(e)使深度变为3。"},
  {subject:"数据结构",type:"判断题",question:"在任何情况下，时间复杂度为 O(n²) 的算法比时间复杂度为 O(n*logn) 的算法所花费的时间都长。（ ）",answer:"×",parse:"时间复杂度描述输入规模极大时的增长趋势，n较小时，O(n²)可能比O(nlogn)更快。"},
  {subject:"数据结构",type:"判断题",question:"冒泡法是一种交换排序技术。（ ）",answer:"√",parse:"冒泡排序通过交换相邻逆序元素，使极值元素逐步到位，属于交换排序。"},
  {subject:"数据结构",type:"判断题",question:"仅基于比较的排序算法能得到的最好的\"最坏时间复杂度\"是 O(N*logN)。（ ）",answer:"√",parse:"基于比较的排序算法时间复杂度下界为O(nlogn)，归并排序、堆排序可达到该下界。"},
  {subject:"数据结构",type:"判断题",question:"空串是由空格构成的串。（ ）",answer:"×",parse:"空串是长度为0、无任何字符的串；由空格组成的串是空格串，长度≥1。"},
  {subject:"数据结构",type:"判断题",question:"索引文件是混合了顺序存储和链式存储的好处而形成的文件结构。（ ）",answer:"√",parse:"索引表顺序存储（支持快速查找），数据区可顺序/链式存储，兼顾效率与灵活性。"},
  {subject:"数据结构",type:"判断题",question:"Prim 算法是图的一种最小生成树算法。（ ）",answer:"√",parse:"最小生成树经典算法：Prim（适合稠密图）、Kruskal（适合稀疏图）。"},
  {subject:"数据结构",type:"判断题",question:"对于线性表，如果在应用中有大量的删除和插入，应该选择链式存储结构。（ ）",answer:"√",parse:"链式存储插入/删除仅修改指针，时间复杂度O(1)；顺序存储需移动元素，O(n)。"},
  {subject:"数据结构",type:"判断题",question:"集合只能采用顺序存储结构进行表示。（ ）",answer:"×",parse:"集合可采用顺序、链式、哈希、树形等多种存储方式。"},
  {subject:"数据结构",type:"判断题",question:"队列是一个 FIFO 模型。（ ）",answer:"√",parse:"队列是先进先出（First In First Out）线性表，队尾插入、队头删除。"},
  {subject:"数据结构",type:"判断题",question:"一个时间复杂度高的算法，其空间复杂度一定很低。（ ）",answer:"×",parse:"时间复杂度与空间复杂度无必然联系，递归算法可能同时偏高。"},
  {subject:"数据结构",type:"判断题",question:"二叉排序树的形态与记录的读入顺序无关。（ ）",answer:"×",parse:"二叉排序树的形态完全由插入顺序决定，不同插入顺序生成不同树形。"},
  {subject:"数据结构",type:"判断题",question:"二叉树是一般树的特殊情形。（ ）",answer:"×",parse:"一般树为多叉树，二叉树每个结点最多2个孩子且分左右，二者是不同结构。"},
  {subject:"数据结构",type:"判断题",question:"在线性表的链式存储结构中，逻辑上相邻的两个元素在物理位置上并不一定紧邻。（ ）",answer:"√",parse:"链式存储通过指针连接元素，逻辑相邻的元素物理位置可分散。"},
  {subject:"数据结构",type:"判断题",question:"在数组中，插入和删除操作是数组的主要操作。（ ）",answer:"×",parse:"数组核心优势是随机存取（O(1)），插入/删除需移动大量元素，效率低，非主要操作。"},
  {subject:"数据结构",type:"判断题",question:"任意广义表都可以分解为表头和表尾两个部分。（ ）",answer:"√",parse:"广义表表头是第一个元素，表尾是剩余元素组成的广义表。"},
  {subject:"数据结构",type:"判断题",question:"在散列表中，常用的散列函数可以通过除余法获得。（ ）",answer:"√",parse:"除余法（H(key)=key mod p，p为质数）是最常用的哈希函数。"},
  // 填空题
  {subject:"数据结构",type:"填空题",question:"两个串的相等，是指两个串的______相等，______相同。",answer:"长度；对应位置的字符",parse:"字符串相等充要条件：长度相同，对应位置字符完全一致。"},
  {subject:"数据结构",type:"填空题",question:"具有n个顶点的无向完全图中包含有______条边，具有n个顶点的有向完全图中包含有______条边。",answer:"n(n-1)/2；n(n-1)",parse:"无向完全图边数为组合数C(n,2)；有向完全图边数为排列数A(n,2)。"},
  {subject:"数据结构",type:"填空题",question:"计算机算法分析的两个主要方面分别是______和______。",answer:"时间复杂度；空间复杂度",parse:"算法分析核心是效率，时间复杂度衡量运行时间趋势，空间复杂度衡量存储空间趋势。"},
  {subject:"数据结构",type:"填空题",question:"带权路径长度最小的二叉树称为最优二叉树，它又被称为______树。",answer:"哈夫曼（Huffman）",parse:"哈夫曼树是带权路径长度（WPL）最小的二叉树，用于数据压缩。"},
  {subject:"数据结构",type:"填空题",question:"折半查找（二分查找）的存储结构仅限于______，而且是______。",answer:"顺序存储结构；有序的",parse:"折半查找需随机访问+有序数据，仅支持顺序存储（数组）。"},
  {subject:"数据结构",type:"填空题",question:"前缀编码是指任一个字符的编码都______另一个字符编码的前缀的一种编码方法。",answer:"不是",parse:"前缀编码保证解码无歧义，避免一个编码是另一个的前缀。"},
  {subject:"数据结构",type:"填空题",question:"设一维数组中有n个数组元素，则读取第i个数组元素的平均时间复杂度为______。",answer:"O(1)",parse:"数组为顺序存储，支持随机访问，时间复杂度为常数级。"},
  {subject:"数据结构",type:"填空题",question:"10阶对称矩阵行优先压缩存储，A[1,1]下标为1，A[8,5]下标是______。",answer:"33",parse:"对称矩阵下三角存储公式：i*(i-1)/2+j，代入8*7/2+5=33。"},
  {subject:"数据结构",type:"填空题",question:"a_{i-1}和a_i是线性表相邻元素，a_{i-1}称为a_i的______。",answer:"直接前驱",parse:"线性表中，前一相邻元素为直接前驱，后一为直接后继。"},
  {subject:"数据结构",type:"填空题",question:"栈的运算遵循______的原则。",answer:"后进先出（LIFO）",parse:"栈仅栈顶可操作，最后入栈的元素最先出栈。"},
  {subject:"数据结构",type:"填空题",question:"链接（链式）存储的特点是利用______来表示数据元素之间的逻辑关系。",answer:"指针（地址）",parse:"链式存储通过结点指针域指向相邻结点，体现逻辑关系。"},
  {subject:"数据结构",type:"填空题",question:"在各种查找方法中，平均查找长度与结点个数n无关的查找方法是______。",answer:"哈希查找（散列查找）",parse:"哈希查找通过函数直接计算地址，理想情况平均查找长度为O(1)。"},
  {subject:"数据结构",type:"填空题",question:"串中模式匹配操作Index(\"DATASTRUCTURE\", \"STR\") = ______。",answer:"5",parse:"模式串\"STR\"在主串中首次出现的起始位置为5（索引从1开始）。"},
  {subject:"数据结构",type:"填空题",question:"在构造哈希表中，不同的关键字产生同一哈希地址的现象，称为______。",answer:"冲突（碰撞）",parse:"哈希冲突需用开放地址法、链地址法等解决。"},
  {subject:"数据结构",type:"填空题",question:"n个结点的二叉链表中，非空的左、右孩子指针域个数为______。",answer:"n-1",parse:"n个结点的二叉树有n-1条边，每条边对应一个非空指针域。"},
  {subject:"数据结构",type:"填空题",question:"具有5个顶点的有向完全图有多少条弧______。",answer:"20",parse:"有向完全图总弧数公式n(n-1)，代入n=5得20。"},
  // 选择题
  {subject:"数据结构",type:"选择题",question:"递归过程或函数调用时，处理参数及返回地址，要用的数据结构是（ ）。<br>A．队列 B．多维数组 C．栈 D. 线性表",answer:"C",parse:"栈后进先出，匹配递归调用的执行顺序，用于存储参数与返回地址。"},
  {subject:"数据结构",type:"选择题",question:"高度为6的满二叉树，结点总数是( )。<br>A、15 B、63 C、20 D、25",answer:"B",parse:"满二叉树结点数公式：2^h-1，h=6时，2^6-1=63。"},
  {subject:"数据结构",type:"选择题",question:"求B在A中首次出现位置的操作称作( )。<br>A、连接 B、求串长 C、模式匹配 D、求子串",answer:"C",parse:"模式匹配是主串中查找模式串的核心操作，A为主串，B为模式串。"},
  {subject:"数据结构",type:"选择题",question:"X、Y、Z顺序进栈，错误的出栈次序是( )。<br>A、XYZ B、YZX C、ZXY D、ZYX",answer:"C",parse:"Z先出栈说明X、Y已入栈，出栈顺序只能是Z→Y→X，ZXY不合法。"},
  {subject:"数据结构",type:"选择题",question:"循环链表的主要优点是( )。<br>A、无需头指针 B、易找直接前驱 C、插入删除更稳定 D、任意结点可扫描全表",answer:"D",parse:"循环链表首尾相连，从任意结点出发可遍历整个链表。"},
  {subject:"数据结构",type:"选择题",question:"关键字比较次数与初始排列无关的排序是（ ）。<br>A、冒泡排序 B、直接选择排序 C、直接插入排序 D、Shell排序",answer:"B",parse:"直接选择排序每趟遍历找最小值，比较次数固定为n(n-1)/2。"},
  {subject:"数据结构",type:"选择题",question:"数组大小6的循环队列，rear=0、front=3，删1加2后，rear、front为（ ）。<br>A.1和5 B.2和4 C.4和2 D.5和1",answer:"B",parse:"出队：front=(3+1)%6=4；入队：rear=(0+2)%6=2。"},
  {subject:"数据结构",type:"选择题",question:"长度为5的数组用直接选择排序，比较次数是( )。<br>A、1 B、15 C、8 D、10",answer:"D",parse:"直接选择排序比较次数公式n(n-1)/2，5×4/2=10。"},
  {subject:"数据结构",type:"选择题",question:"S1='ABCDEFG'，S2='PQRST'，con(subs(S1,2,len(S2)),subs(S1,len(S2),2))结果是( )。<br>A、BCDEF B、BCDEFG C、BCPQRST D、BCDEFEF",answer:"D",parse:"subs(S1,2,5)=BCDEF，subs(S1,5,2)=EF，连接得BCDEFEF。"},
  {subject:"数据结构",type:"选择题",question:"数组A[8,5]行优先存储，元素占3字节，起始地址SA，地址为( )。<br>A、SA+141 B、SA+144 C、SA+225 D、SA+222",answer:"D",parse:"地址=SA+[(8-1)×10+(5-1)]×3=SA+222。"},
  {subject:"数据结构",type:"选择题",question:"数组A[1..5,1..6]元素占5单元，首地址1000，A[5,5]地址为( )。<br>A、1120 B、1125 C、1140 D、1145",answer:"C",parse:"地址=1000+[(5-1)×6+(5-1)]×5=1140。"},
  {subject:"数据结构",type:"选择题",question:"线性表常用随机存取、尾插尾删，最优存储是( )。<br>A、双链表 B、单循环链表 C、双循环链表 D、顺序表",answer:"D",parse:"顺序表随机存取O(1)，尾插尾删无需移动元素，效率最高。"},
  {subject:"数据结构",type:"选择题",question:"a-f依次进栈，禁止连续3次退栈，不可能序列是( )。<br>A、b c a e f d B、c b d a e f C、d c e b f a D、a f e d c b",answer:"D",parse:"D选项出现连续三次退栈，违反题目限制。"},
  {subject:"数据结构",type:"选择题",question:"以下说法正确的是（ ）。<br>A、数据项是数据基本单位 B、不同数据可同逻辑结构 C、数据结构是数据项集合 D、数据元素是最小单位",answer:"B",parse:"数据元素是基本单位，数据项是最小单位，不同数据可拥有相同逻辑结构。"},
  {subject:"数据结构",type:"选择题",question:"有序表二分查找82，比较次数为( )。<br>A、8 B、1 C、4 D、2",answer:"C",parse:"依次比较45→77→95→82，共4次。"},
  {subject:"数据结构",type:"选择题",question:"关键字(46,79,56,38,40,84)，快速排序以46为枢轴，一次划分结果为（ ）。<br>A、(38,40,46,56,79,84) B、(40,38,46,79,56,84) C、(40,38,46,56,79,84) D、(40,38,46,84,56,79)",answer:"C",parse:"快速排序一次划分后结果为(40,38,46,56,79,84)。"},
  {subject:"数据结构",type:"选择题",question:"串是特殊线性表，特殊性表现在（ ）。<br>A.可顺序存储 B.元素是单个字符 C.可链式存储 D.元素是多个字符",answer:"B",parse:"串是字符有限序列，数据元素为单个字符，是与普通线性表的核心区别。"},
  {subject:"数据结构",type:"选择题",question:"65个结点的完全二叉树深度为（根深度1）( )。<br>A、8 B、7 C、6 D、5",answer:"B",parse:"完全二叉树深度公式：h=⌊log₂n⌋+1，⌊log₂65⌋=6，h=7。"},
  {subject:"数据结构",type:"选择题",question:"森林三棵树结点数M1、M2、M3，对应二叉树根右子树结点数是（ ）。<br>A、M1 B、M1+M2 C、M2+M3 D、M3",answer:"C",parse:"森林转二叉树：第一棵树为左子树，剩余树为右子树，结点数M2+M3。"},
  {subject:"数据结构",type:"选择题",question:"下列说法不正确的是（ ）。<br>A、图遍历每顶点仅访一次 B、遍历有DFS、BFS C、DFS是递归 D、DFS不适用于有向图",answer:"D",parse:"深度优先遍历（DFS）适用于有向图和无向图。"},
  {subject:"数据结构",type:"选择题",question:"链表不具有的特点是( )。<br>A.插入删除不需移元素 B.方便随机访问 C.不必预估空间 D.空间与长度成正比",answer:"B",parse:"链表为链式存储，不支持随机访问，只能顺序遍历。"},
  {subject:"数据结构",type:"选择题",question:"DS=(D,R)，D={17,23,45,52,63}，R={}，数据结构是（ ）。<br>A.集合 B.线性结构 C.树形结构 D.图状结构",answer:"A",parse:"集合结构中元素无逻辑关系，R为空集符合集合定义。"},
  {subject:"数据结构",type:"选择题",question:"冒泡排序从大到小排序，交换次数最多的是（ ）。<br>A.从小到大排好 B.从大到小排好 C.元素无序 D.元素基本有序",answer:"A",parse:"逆序对数量最多，交换次数达到最大值n(n-1)/2。"},
  {subject:"数据结构",type:"选择题",question:"二叉树中序和后序序列相反，该二叉树是( )。<br>A.空/单结点 B.高度=结点数 C.无左孩子 D.无右孩子",answer:"C",parse:"中序左-根-右，后序左-右-根，无左孩子时两序列相反。"},
  {subject:"数据结构",type:"选择题",question:"广义表(a,(b,c),d,(),((f,g),h))，长度深度为（ ）。<br>A.4和6 B.6和3 C.3和5 D.5和3",answer:"D",parse:"长度为顶层元素个数（5），深度为最大括号嵌套层数（3）。"},
  {subject:"数据结构",type:"选择题",question:"图V1出发DFS遍历序列为( )。<br>A.V1,V2,V3,V4,V5,V6 B.V1,V2,V4,V5,V6,V3 C.V1,V3,V5,V2,V4,V6 D.V1,V3,V5,V6,V4,V2",answer:"C",parse:"DFS优先访问当前顶点的未访问邻接点，序列合法。"},
  {subject:"数据结构",type:"选择题",question:"后序FDEBGCA，中序FDBEACG，前序是( )。<br>A.ABCDEFG B.ABDFEGC C.ABDFECG D.ABDEFCG",answer:"C",parse:"构建二叉树后，前序遍历结果为ABDFECG。"},
  {subject:"数据结构",type:"选择题",question:"栈输入1-5，合法输出序列是( )。<br>A.3 2 1 5 4 B.5 1 2 3 4 C.4 5 1 3 2 D.4 3 1 2 5",answer:"A",parse:"A选项符合栈后进先出规则，其余选项均违反栈特性。"},
  {subject:"数据结构",type:"选择题",question:"以下陈述正确的是（ ）。<br>A.矩阵无插入删除 B.二维矩阵只能行优先 C.对称矩阵不能压缩 D.稀疏矩阵可顺序存储",answer:"D",parse:"稀疏矩阵可通过三元组表（顺序存储）存储非零元素。"},
  {subject:"数据结构",type:"选择题",question:"二叉树结点n、m，中序n在m前的条件是( )。<br>A.n在m左方 B.n在m右方 C.n是m祖先 D.n是m子孙",answer:"A",parse:"中序遍历规则左-根-右，左方结点优先被访问。"},
  {subject:"数据结构",type:"选择题",question:"前序{4,2,1,3,6,5,7}，中序{1,2,3,4,5,6,7}，错误的是( )。<br>A.完全二叉树 B.奇数在叶子 C.二叉搜索树 D.2是5的父结点",answer:"D",parse:"5的父结点是6，2不是5的父结点。"},
  {subject:"数据结构",type:"选择题",question:"下列选项中，不是拓扑序列的是( )。<br>A.1,5,2,3,6,4 B.5,1,2,6,3,4 C.5,1,2,3,6,4 D.5,2,1,6,3,4",answer:"A",parse:"拓扑序列要求前驱在后继前，5是1的前驱，1不能在5之前。"},
  {subject:"数据结构",type:"选择题",question:"可能成为折半查找判定树的是（ ）。",answer:"A",parse:"折半查找判定树是平衡二叉树，左右子树结点数差≤1。"},
  {subject:"数据结构",type:"选择题",question:"数据的基本单位是（ ）。<br>A.数据元素 B.文件 C.数据项 D.数据结构",answer:"A",parse:"数据元素是数据的基本单位，数据项是最小单位。"},
  {subject:"数据结构",type:"选择题",question:"最后一趟前所有元素不在最终位置的排序是( )。<br>A.冒泡 B.插入 C.堆 D.快速",answer:"B",parse:"插入排序逐步插入有序区，前几趟无元素到达最终位置。"},
  {subject:"数据结构",type:"选择题",question:"循环队列数组大小6，front=0、rear=4，删2加2后，front、rear为( )。<br>A.2和0 B.2和2 C.2和4 D.2和6",answer:"A",parse:"出队：front=(0+2)%6=2；入队：rear=(4+2)%6=0。"},
  {subject:"数据结构",type:"选择题",question:"广义表((a,b),c,d,e)表头表尾是（ ）。<br>A.a和e B.a和(c,d,e) C.(a,b)和e D.(a,b)和(c,d,e)",answer:"D",parse:"表头是第一个元素（子表(a,b)），表尾是剩余元素组成的广义表。"},
  {subject:"数据结构",type:"选择题",question:"串的特殊性体现在( )。<br>A.可以顺序存储 B.数据元素是一个字符 C.可以链接存储 D.数据元素可以是多个字符",answer:"B",parse:"串的每个数据元素只能是单个字符。"},
  // 问答题与算法设计题
  {subject:"数据结构",type:"问答题",question:"请从元素构成、元素之间的关系、以及操作（运算）三个方面简述栈和队列之间的异同。",answer:"相同点：①元素构成：都是线性表，元素类型相同；②元素关系：都是一对一的线性关系；③操作：都只能在端点进行插入和删除操作。不同点：①操作位置：栈只能在栈顶（一端）插入和删除；队列在队尾插入、队头删除（两端操作）；②操作特性：栈是后进先出（LIFO）；队列是先进先出（FIFO）。",parse:"常考简答题，需从三个维度对比。"},
  {subject:"数据结构",type:"问答题",question:"已知L是带表头结点的非空单链表，且P结点既不是首元结点，也不是尾元结点，请写出删除P结点的过程。（注意：除了已知变量以外，只允许额外使用Q指针变量。）",answer:"Q = P->next; // Q指向P的后继结点\nP->data = Q->data; // 将Q的数据复制到P\nP->next = Q->next; // 让P指向Q的后继\nfree(Q); // 释放Q结点",parse:"通过复制后继结点数据并删除后继的方式，无需找到P的前驱，时间复杂度O(1)。"},
  {subject:"数据结构",type:"问答题",question:"用孩子链表表示法表示下图中的树，结点存储顺序为A、B、C、D、E、F、G。（树结构：A是根，孩子为B、C、D；B的孩子为E、F；C的孩子为G；D、E、F、G无孩子）",answer:"表头结点数组（按A~G顺序存储，下标从0开始）：A(0), B(1), C(2), D(3), E(4), F(5), G(6)\n孩子链表：\nA → 1 → 2 → 3 → ∧\nB → 4 → 5 → ∧\nC → 6 → ∧\nD → ∧\nE → ∧\nF → ∧\nG → ∧\n说明：链表中数字为孩子结点在表头数组中的下标。A(下标0)的孩子为B(1)、C(2)、D(3)；B(下标1)的孩子为E(4)、F(5)；C(下标2)的孩子为G(6)；D、E、F、G无孩子，链表为空（用∧表示）。",parse:"孩子链表表示法由表头结点数组和孩子结点链表组成。"},
  {subject:"数据结构",type:"问答题",question:"已知哈希表的地址空间是0..12,哈希函数为H(k)=key mod 13,采用开放地址法线性探测再散列处理冲突,将关键字集合{12,23,45,57,20,03,78,31,15,36}依次存入该散列表中,并求出在等概率下的平均查找长度。",answer:"插入过程：\n1. 12: H(12)=12，存入地址12，查找1次。\n2. 23: H(23)=10，存入地址10，查找1次。\n3. 45: H(45)=6，存入地址6，查找1次。\n4. 57: H(57)=5，存入地址5，查找1次。\n5. 20: H(20)=7，存入地址7，查找1次。\n6. 03: H(03)=3，存入地址3，查找1次。\n7. 78: H(78)=0，存入地址0，查找1次。\n8. 31: H(31)=5冲突，探测6(有45)、7(有20)、8(空)，存入地址8，查找4次。\n9. 15: H(15)=2，存入地址2，查找1次。\n10. 36: H(36)=10冲突，探测11(空)，存入地址11，查找2次。\n最终哈希表（地址0~12）：78, -, 15, 03, -, 57, 45, 20, 31, -, 23, 36, 12（\"-\"表示空）\n平均查找长度ASL = (1+1+1+1+1+1+1+4+1+2)/10 = 14/10 = 1.4",parse:"哈希查找ASL计算，需写出完整冲突处理过程。"},
  {subject:"数据结构",type:"问答题",question:"已知一组关键字为{25,18,46,2,53,39,32,4,74,67,60,11}。按表中的元素顺序依次插入到一棵初始为空的二叉排序树中,画出该二叉排序树。",answer:"二叉排序树如下：\n                25\n               /  \\\n             18    46\n            /     /  \\\n           2     39   53\n            \\   /      \\\n             4 32       74\n              \\        /\n              11     67\n                    /\n                   60\n说明：每个结点的左子树所有结点值均小于该结点值，右子树所有结点值均大于该结点值。",parse:"左小右大规则构建二叉排序树。"},
  {subject:"数据结构",type:"问答题",question:"待排序的序列为{8，3，2，5，6}，请写出插入排序的过程。（写出每趟排序的结果序列）",answer:"初始序列：8, 3, 2, 5, 6\n第1趟（插入3）：[3, 8], 2, 5, 6\n第2趟（插入2）：[2, 3, 8], 5, 6\n第3趟（插入5）：[2, 3, 5, 8], 6\n第4趟（插入6）：[2, 3, 5, 6, 8]\n最终有序序列：2, 3, 5, 6, 8",parse:"直接插入排序每趟将未排序元素插入到已排序序列的正确位置。"},
  {subject:"数据结构",type:"问答题",question:"请回答算法的五个特性。",answer:"①有穷性：算法必须在有限步内结束；②确定性：每一步操作都有明确的定义，无二义性；③可行性：每一步操作都能通过有限次基本运算实现；④输入：有0个或多个输入；⑤输出：有1个或多个输出。",parse:"算法的五种基本属性，常考。"},
  {subject:"数据结构",type:"问答题",question:"双向链表中在结点A和B之间插入结点C，再删除结点C（前驱指针prev，后继指针next）。",answer:"（1）插入结点C的过程（4步）：\nC->prev = A;        // C的前驱指向A\nC->next = B;        // C的后继指向B\nA->next = C;        // A的后继指向C\nB->prev = C;        // B的前驱指向C\n（2）删除结点C的过程（3步）：\nC->prev->next = C->next;   // A的后继指向B（跳过C）\nC->next->prev = C->prev;   // B的前驱指向A（跳过C）\nfree(C);                   // 释放C结点所占内存",parse:"双向链表插入删除操作，注意修改指针顺序。"},
  {subject:"数据结构",type:"问答题",question:"一份电文中有6种字符：A,B,C,D,E,F，它们的出现频率依次为16，5，9，3，30，1，完成问题：（1）设计一棵哈夫曼树；（画出其树结构）（2）计算其带权路径长度WPL。",answer:"（1）构造过程：初始权值序列：1(F)、3(D)、5(B)、9(C)、16(A)、30(E)\n第1步：合并1和3，新结点权值4 → 剩余：4、5、9、16、30\n第2步：合并4和5，新结点权值9 → 剩余：9、9、16、30\n第3步：合并9和9，新结点权值18 → 剩余：16、18、30\n第4步：合并16和18，新结点权值34 → 剩余：30、34\n第5步：合并30和34，新结点权值64（根结点）\n哈夫曼树结构：\n                        64\n                       /  \\\n                     34    E(30)\n                   /    \\\n                 18       A(16)\n               /    \\\n             9        9(C)\n           /   \\\n        4        B(5)\n      /   \\\n   F(1)   D(3)\n（2）WPL = 1×4 + 3×4 + 5×3 + 9×2 + 16×2 + 30×1 = 4+12+15+18+32+30 = 111",parse:"哈夫曼树构造及WPL计算，选最小的两个权值合并。"},
  {subject:"数据结构",type:"问答题",question:"对于给定11个数据元素的有序表{2,3,10,15,20,25,28,29,30,35,40},采用二分查找,试问：(1)若查找给定值为20的元素,将依次与表中哪些元素比较？(2)若查找给定值为26的元素,将依次与哪些元素比较？",answer:"(1)查找20：依次比较25→10→15→20，共4次比较。\n(2)查找26：依次比较25→30→28，共3次比较，查找失败。\n详细过程：初始low=1,high=11。查20：mid=6(25)，20<25→high=5；mid=3(10)，20>10→low=4；mid=4(15)，20>15→low=5；mid=5(20)，成功。查26：mid=6(25)，26>25→low=7；mid=9(30)，26<30→high=8；mid=7(28)，26<28→high=6，low>high，失败。",parse:"二分查找过程，mid=(low+high)/2向下取整。"},
  {subject:"数据结构",type:"问答题",question:"画出有向图的邻接表示意图。（有向图顶点1、2、3，边1→2、1→3、2→3）",answer:"邻接表：\n1 → 2 → 3 → ∧\n2 → 3 → ∧\n3 → ∧",parse:"邻接表由顶点表和边表组成，每个顶点对应一个链表存储其邻接点。"},
  {subject:"数据结构",type:"问答题",question:"判断以下序列是否为堆，如果不是，逐步将它调整为小顶堆（要求写出调整过程）。（56, 37, 48, 24, 61, 05, 16, 37）",answer:"判断：56>左孩子37，不满足小顶堆条件，不是堆。\n调整过程（从最后一个非叶结点i=4开始）：\n(1)i=4：值24，孩子37，24<37，不需交换。\n(2)i=3：值48，孩子05和16，较小者05，48>05，交换48和05。序列：56,37,05,24,61,48,16,37\n(3)i=2：值37，孩子24和61，较小者24，37>24，交换37和24。序列：56,24,05,37,61,48,16,37\n(4)i=1：值56，孩子24和05，较小者05，56>05，交换56和05。序列：05,24,56,37,61,48,16,37\n交换后56在位置3，孩子为48和16，较小者16，56>16，交换56和16。\n最终小顶堆：05,24,16,37,61,48,56,37",parse:"堆调整过程，从下向上、从右向左筛选。"},
  {subject:"数据结构",type:"问答题",question:"请回答判断算法的好坏标准有哪些？",answer:"判断算法好坏的标准主要有五个方面：①正确性：算法能正确解决问题，对所有合法输入都能得到预期的正确结果；②时间复杂度：算法执行时间随问题规模增长的趋势，越低效率越高；③空间复杂度：算法执行过程中所需额外存储空间随问题规模增长的趋势，越低越省内存；④可读性：算法逻辑清晰、结构合理、注释完善，便于阅读、理解和维护；⑤健壮性：算法对非法输入或异常情况有处理能力，不会崩溃。",parse:"算法评价五标准，常考。"},
  {subject:"数据结构",type:"问答题",question:"已知一组关键字为{26,19,45,2,50,38,30,5,70,66,58,10}。按表中的元素顺序依次插入到一棵初始为空的二叉排序树中，画出此二叉排序树。",answer:"二叉排序树如下：\n                26\n              /    \\\n            19      45\n           /       /  \\\n          2       38   50\n           \\     /      \\\n            5   30       70\n            \\           /\n            10        66\n                     /\n                    58\n说明：左子树值<根<右子树值。",parse:"左小右大规则构建。"},
  {subject:"数据结构",type:"问答题",question:"已知哈希表的地址空间是0..10,哈希函数为H(k)=key mod 11,采用开放地址法线性探测再散列处理冲突,将关键字集合{16,74,60,43,54,90,46,31,29}依次存入该散列表中,并求出在等概率下的平均查找长度。",answer:"插入过程：\n1. 16: H(16)=5，存入地址5，查找1次。\n2. 74: H(74)=8，存入地址8，查找1次。\n3. 60: H(60)=5冲突，探测6(空)，存入地址6，查找2次。\n4. 43: H(43)=10，存入地址10，查找1次。\n5. 54: H(54)=10冲突，探测0(空)，存入地址0，查找2次。\n6. 90: H(90)=2，存入地址2，查找1次。\n7. 46: H(46)=2冲突，探测3(空)，存入地址3，查找2次。\n8. 31: H(31)=9，存入地址9，查找1次。\n9. 29: H(29)=7，存入地址7，查找1次。\n最终哈希表（地址0~10）：54, -, 90, 46, -, 16, 60, 29, 74, 31, 43\n各关键字查找长度：1,1,2,1,2,1,2,1,1\n平均查找长度ASL = (1+1+2+1+2+1+2+1+1)/9 = 12/9 = 4/3 ≈ 1.33",parse:"哈希查找ASL计算，需写出冲突处理过程。"},
  {subject:"数据结构",type:"问答题",question:"简述以下算法的功能（栈和队列的元素类型均为int）\nvoid algo(Queue & Q){\n    Stack S; int d;\n    InitStack(S);\n    while(!QueueEmpty(Q)){\n        DeQueue(Q, d); Push(S, d);\n    }\n    while(!StackEmpty(S)){\n        Pop(S, d); EnQueue(Q, d);\n    }\n}",answer:"算法功能：将队列Q中的元素逆置。\n执行过程：第一步，依次将队列所有元素出队并压入栈S中（利用栈LIFO特性）；第二步，依次将栈S中所有元素出栈并重新入队到队列Q中。最终队列Q中元素的顺序与原来完全相反。",parse:"利用栈后进先出特性实现队列逆置。"},
  {subject:"数据结构",type:"问答题",question:"给出下图的邻接表，结点存储顺序为1、2、3、4、5、6，并给出其拓扑排序。（有向边：1→2,1→3,2→4,3→4,4→5,4→6）",answer:"邻接表：\n1 → 2 → 3 → ∧\n2 → 4 → ∧\n3 → 4 → ∧\n4 → 5 → 6 → ∧\n5 → ∧\n6 → ∧\n拓扑排序（一种）：1, 2, 3, 4, 5, 6（或1,3,2,4,5,6等）\n说明：拓扑排序要求所有前驱结点必须在后继结点之前。",parse:"邻接表存储结构及拓扑排序。"},
  {subject:"数据结构",type:"问答题",question:"已知权值序列：{2, 3, 4, 4, 7}构造一棵哈夫曼树，并计算WPL。",answer:"构造过程：初始序列{2,3,4,4,7}\n1.合并2和3，新结点权值5，剩余：4,4,5,7\n2.合并4和4，新结点权值8，剩余：5,7,8\n3.合并5和7，新结点权值12，剩余：8,12\n4.合并8和12，新结点权值20（根）\n哈夫曼树结构：\n                20\n              /    \\\n             8     12\n           /  \\   /  \\\n          4    4 5    7\n         / \\\n        2   3\nWPL = (2+3)×3 + 4×2 + 4×2 + 7×2 = 15+8+8+14 = 45",parse:"哈夫曼树构造及WPL计算。"},
  {subject:"数据结构",type:"问答题",question:"在单链表、双向链表和单向循环链表中，若仅知道指针p指向某结点，不知道头指针，能否将结点p从相应链表中删除，并说明理由。",answer:"（1）单链表：不能。理由：单链表结点只有后继指针next，无法通过结点p找到其直接前驱结点，无法修改前驱的next指针使其指向p的后继，因此无法完成删除。\n（2）双向链表：可以。理由：双向链表结点同时有前驱指针prev和后继指针next，可通过p->prev直接找到前驱结点，修改前驱的next和后继的prev即可完成删除，时间复杂度O(1)。\n（3）单向循环链表：可以。理由：从结点p出发沿next指针遍历一圈，一定能找到p的直接前驱结点，修改前驱的next指针指向p->next即可完成删除。时间复杂度O(n)。",parse:"三种链表的删除特性对比。"},
  {subject:"数据结构",type:"问答题",question:"已知一个图的顶点集V和边集E分别为：V={1,2,3,4,5,6,7}；E={(1,2)3,(1,3)5,(1,4)8,(2,5)10,(2,3)6,(3,4)15,(3,5)12,(3,6)9,(4,6)4,(4,7)20,(5,6)18,(6,7)25}；给出该图的最小生成树上边的集合并计算最小生成树各边上的权值之和。",answer:"采用克鲁斯卡尔算法，边按权值递增排序：\n(1,2)3, (4,6)4, (1,3)5, (2,3)6, (1,4)8, (3,6)9, (2,5)10, (3,5)12, (3,4)15, (5,6)18, (4,7)20, (6,7)25\n选取过程（不形成回路）：\n①(1,2)3 ②(4,6)4 ③(1,3)5 ④(2,5)10 ⑤(3,6)9 ⑥(4,7)20\n（注：(2,3)6、(1,4)8形成回路，不选）\n最小生成树边集：{(1,2)3, (4,6)4, (1,3)5, (3,6)9, (2,5)10, (4,7)20}\n权值之和 = 3+4+5+9+10+20 = 51",parse:"最小生成树Kruskal算法，按权值递增选边且不形成回路。"},
  {subject:"数据结构",type:"问答题",question:"假设Q[0..10]是一个线性队列，初始状态为front=rear=0，画出做完下列操作后队列的头尾指针的状态变化情况，若不能入队，请指出其元素，并说明理由。\nd,e,b,g,h入队 → d,e出队 → i,j,k,l,m入队 → n,o,p入队",answer:"操作过程：\n(1) d,e,b,g,h入队（5个元素）：入队rear后移5次，rear=5，front=0。队列状态：[d,e,b,g,h]\n(2) d,e出队（2个元素）：出队front后移2次，front=2，rear=5。队列状态：[_,_,b,g,h]\n(3) i,j,k,l,m入队（5个元素）：入队rear后移5次，rear=10，front=2。队列状态：[_,_,b,g,h,i,j,k,l,m]\n(4) n,o,p入队（3个元素）：rear=10已到达数组上界，n入队后rear=11（超出最大下标10），队列满，o和p无法入队。\n不能入队的元素：o, p。理由：线性队列rear指针已到达数组末尾，队列已满，出现\"假溢出\"（实际队列中还有front=2之前的2个空闲位置，但因线性队列rear已到数组上界，无法继续存放入队元素）。",parse:"线性队列操作及假溢出问题。"},
  {subject:"数据结构",type:"问答题",question:"写出稀疏矩阵的三元组存储结构示意图。（非零元：(0,4,7),(1,0,3),(2,2,2),(4,4,2)）",answer:"三元组表结构：\n| 行号 | 列号 | 值 |\n|------|------|----|\n|  0   |  4   | 7  |\n|  1   |  0   | 3  |\n|  2   |  2   | 2  |\n|  4   |  4   | 2  |\n矩阵属性：行数6，列数5，非零元个数4。",parse:"稀疏矩阵压缩存储三元组表示。"},
  {subject:"数据结构",type:"问答题",question:"已知一组关键字（26, 3, 14, 27, 42, 25, 7, 16, 11, 43），按表中的元素顺序依次插入到一棵初始为空的二叉排序树中，画出该二叉排序树。",answer:"二叉排序树如下：\n                26\n              /    \\\n            3       27\n             \\        \\\n             14       42\n            /  \\        \\\n           7   25       43\n            \\  /\n            11 16\n说明：左子树值<根<右子树值。",parse:"左小右大规则构建二叉排序树。"},
  {subject:"数据结构",type:"问答题",question:"使用迪杰斯特拉（Dijkstra）算法求图中从0顶点出发到其它所有顶点的最短路径长度。（图结构：顶点0-5，边权0-1:1,0-2:4,1-2:2,1-3:6,2-3:3,2-4:5,3-4:1,3-5:4,4-5:2）",answer:"Dijkstra算法计算过程：\n1.初始化：S={0}，dist[0]=0，dist[1]=1，dist[2]=4，dist[3]=∞，dist[4]=∞，dist[5]=∞\n2.选dist[1]=1，S={0,1}，更新：dist[2]=min(4,1+2)=3，dist[3]=min(∞,1+6)=7\n3.选dist[2]=3，S={0,1,2}，更新：dist[3]=min(7,3+3)=6，dist[4]=min(∞,3+5)=8\n4.选dist[3]=6，S={0,1,2,3}，更新：dist[4]=min(8,6+1)=7，dist[5]=min(∞,6+4)=10\n5.选dist[4]=7，S={0,1,2,3,4}，更新：dist[5]=min(10,7+2)=9\n6.选dist[5]=9，算法结束。\n最终结果：0→1:1，0→2:3，0→3:6，0→4:7，0→5:9",parse:"Dijkstra算法求单源最短路径。"},
  // 算法设计题
  {subject:"数据结构",type:"算法设计题",question:"假设二叉树采用二叉链表的存储结构，试写出统计叶子结点数量的算法。",answer:"算法思想：采用递归方法，若树为空返回0；若当前结点无左右孩子则是叶子结点返回1；否则递归统计左子树和右子树的叶子结点数并求和。\n\n算法实现（C语言）：\ntypedef struct BiTNode {\n    int data;\n    struct BiTNode *lchild, *rchild;\n} BiTNode, *BiTree;\n\nint CountLeaf(BiTree T) {\n    if (T == NULL) return 0;                    // 空树，叶子数为0\n    if (T->lchild == NULL && T->rchild == NULL) // 叶子结点\n        return 1;\n    return CountLeaf(T->lchild) + CountLeaf(T->rchild);\n}\n\n时间复杂度O(n)，空间复杂度O(h)，h为树的高度。",parse:"递归统计叶子结点，空树返回0，叶子返回1，否则递归求和。"},
  {subject:"数据结构",type:"算法设计题",question:"试写一算法，实现对顺序表（线性表的顺序存储结构）的就地逆置，即利用原表的存储结构将线性表（a1，a2，...，an）逆置为（an，an-1,...，a2, a1）。",answer:"算法思想：使用两个下标i和j分别指向顺序表的第一个元素和最后一个元素，交换L.elem[i]与L.elem[j]，然后i向后移动，j向前移动，直到i≥j为止，实现原地逆置。\n\n算法实现（C语言）：\n#define MAXSIZE 100\ntypedef struct {\n    int elem[MAXSIZE];\n    int length;\n} SqList;\n\nvoid ReverseSqList(SqList *L) {\n    int i, temp;\n    for (i = 0; i < L->length / 2; i++) {\n        temp = L->elem[i];\n        L->elem[i] = L->elem[L->length - 1 - i];\n        L->elem[L->length - 1 - i] = temp;\n    }\n}\n\n时间复杂度O(n)，空间复杂度O(1)，满足就地逆置要求。",parse:"双指针交换法，时间复杂度O(n)，空间复杂度O(1)。"},
  {subject:"数据结构",type:"算法设计题",question:"输入扩充的先序序列构建二叉树。例如：一个先序序列\"AB#C##D##\"，其中#表示空指针，通过这个序列构建二叉树。请写出此算法。",answer:"算法思想：按扩充先序序列递归构建二叉树。若当前字符为'#'，则当前子树为空；否则创建根结点，递归构建左子树和右子树。\n\n算法实现（C语言）：\ntypedef struct BiTNode {\n    char data;\n    struct BiTNode *lchild, *rchild;\n} BiTNode, *BiTree;\n\nint pos = 0;  // 全局变量记录当前读取位置\n\nvoid CreateBiTree(BiTree *T, char str[]) {\n    char ch = str[pos++];\n    if (ch == '#') {\n        *T = NULL;\n        return;\n    }\n    *T = (BiTree)malloc(sizeof(BiTNode));\n    (*T)->data = ch;\n    CreateBiTree(&(*T)->lchild, str);\n    CreateBiTree(&(*T)->rchild, str);\n}\n\n时间复杂度O(n)，每个结点访问一次。",parse:"递归构建二叉树，'#'表示空指针。"},
  {subject:"数据结构",type:"算法设计题",question:"试写一算法，实现如下功能：算法接收用户的输入若干个整数，用前插法建立单链表。",answer:"算法思想：前插法（头插法）建立单链表，每读入一个整数，创建新结点，将其插入到当前链表的头部，使得最终链表顺序与输入顺序相反。设输入以-1结束。\n\n算法实现（C语言）：\n#include <stdio.h>\n#include <stdlib.h>\n\ntypedef struct LNode {\n    int data;\n    struct LNode *next;\n} LNode, *LinkList;\n\nLinkList CreateList_Head() {\n    LinkList L = NULL;\n    LNode *p;\n    int x;\n    printf(\"请输入若干整数，以-1结束：\\n\");\n    scanf(\"%d\", &x);\n    while (x != -1) {\n        p = (LNode *)malloc(sizeof(LNode));\n        p->data = x;\n        p->next = L;\n        L = p;\n        scanf(\"%d\", &x);\n    }\n    return L;\n}\n\n时间复杂度O(n)，建立的链表为输入序列的逆序。",parse:"前插法/头插法建立单链表，新结点始终插入链表头部。"},
  {subject:"数据结构",type:"算法设计题",question:"已知顺序表中元素值递增有序。用算法实现将元素x插到表中适当的位置上，以保持顺序表的有序性。",answer:"算法思想：首先找到第一个大于或等于x的元素位置，然后将该位置及之后的所有元素后移一位，再将x存入空出的位置，最后表长加1。若顺序表已满则无法插入。\n\n算法实现（C语言）：\n#define MAXSIZE 100\ntypedef struct {\n    int data[MAXSIZE];\n    int length;\n} SqList;\n\nint InsertSqList(SqList *L, int x) {\n    int i, pos;\n    if (L->length >= MAXSIZE) return 0;  // 表已满\n    for (pos = 0; pos < L->length && L->data[pos] < x; pos++);  // 找插入位置\n    for (i = L->length; i > pos; i--) {\n        L->data[i] = L->data[i-1];  // 元素后移\n    }\n    L->data[pos] = x;  // 插入x\n    L->length++;\n    return 1;\n}\n\n时间复杂度O(n)，空间复杂度O(1)。",parse:"有序插入，先找位置再后移，最后插入。"},
  {subject:"数据结构",type:"算法设计题",question:"设计算法求以二叉链表为存储结构的二叉树的深度。",answer:"算法思想：采用递归方法，若树为空深度为0；否则分别递归计算左子树和右子树的深度，取较大值再加1（根结点层）作为整棵树的深度。\n\n算法实现（C语言）：\ntypedef struct BiTNode {\n    int data;\n    struct BiTNode *lchild, *rchild;\n} BiTNode, *BiTree;\n\nint BiTreeDepth(BiTree T) {\n    if (T == NULL) return 0;\n    int leftDepth = BiTreeDepth(T->lchild);\n    int rightDepth = BiTreeDepth(T->rchild);\n    return (leftDepth > rightDepth ? leftDepth : rightDepth) + 1;\n}\n\n时间复杂度O(n)，空间复杂度O(h)，h为树的高度。",parse:"递归求二叉树深度，取左右子树深度最大值加1。"},
  {subject:"数据结构",type:"算法设计题",question:"编写一个计算单链表（此链表带头结点）中结点个数的算法，并依次打印出链表中元素的值。",answer:"算法思想：设置计数器count初始为0，指针p指向第一个数据结点（头结点的后继），依次遍历链表，每访问一个结点输出其数据域的值，同时计数器加1，直到p为NULL。\n\n算法实现（C语言）：\n#include <stdio.h>\n#include <stdlib.h>\n\ntypedef struct LNode {\n    int data;\n    struct LNode *next;\n} LNode, *LinkList;\n\nint CountAndPrint(LinkList L) {\n    int count = 0;\n    LNode *p = L->next;  // p指向第一个数据结点\n    printf(\"链表元素为：\");\n    while (p != NULL) {\n        count++;\n        printf(\"%d \", p->data);\n        p = p->next;\n    }\n    printf(\"\\n\");\n    return count;\n}\n\n时间复杂度O(n)，空间复杂度O(1)。",parse:"遍历带头结点的单链表，计数并打印元素值。"},
  {subject:"数据结构",type:"算法设计题",question:"请写出起泡排序（基本交换排序）的算法。",answer:"算法思想：通过重复遍历待排序序列，依次比较相邻元素的值，若逆序则交换，使较小元素逐渐\"浮\"到序列前端。每趟排序确定一个最大元素的位置，若某趟未发生交换则序列已有序，可提前结束。\n\n算法实现（C语言）：\nvoid BubbleSort(int a[], int n) {\n    int i, j, temp;\n    int flag;  // 标记本趟是否发生交换\n    for (i = 0; i < n - 1; i++) {\n        flag = 0;\n        for (j = 0; j < n - 1 - i; j++) {\n            if (a[j] > a[j + 1]) {\n                temp = a[j];\n                a[j] = a[j + 1];\n                a[j + 1] = temp;\n                flag = 1;\n            }\n        }\n        if (flag == 0) break;  // 本趟无交换，已有序\n    }\n}\n\n时间复杂度：最好O(n)，平均和最坏O(n²)。空间复杂度O(1)，稳定排序。",parse:"冒泡排序，通过相邻元素比较交换实现排序，可提前结束优化。"},
